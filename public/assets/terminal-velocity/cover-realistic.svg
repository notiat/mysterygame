<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="aircraftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a3442;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#3a4552;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2a3442;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="titleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.8" />
    </linearGradient>
    
    <radialGradient id="spotLight" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    
    <filter id="dramaticShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.7"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Dramatic spotlight from above -->
  <ellipse cx="600" cy="200" rx="500" ry="400" fill="url(#spotLight)"/>
  
  <!-- Crime scene tape (top) -->
  <rect x="0" y="0" width="1200" height="40" fill="#ffd700" opacity="0.3"/>
  <text x="600" y="28" fill="#000" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">⚠ FBI INVESTIGATION - CLASSIFIED ⚠ FBI INVESTIGATION - CLASSIFIED ⚠</text>
  
  <!-- Aircraft silhouette (private jet) -->
  <g filter="url(#dramaticShadow)" opacity="0.4">
    <!-- Fuselage -->
    <ellipse cx="600" cy="350" rx="280" ry="60" fill="url(#aircraftGrad)"/>
    <rect x="320" y="320" width="560" height="60" rx="10" fill="url(#aircraftGrad)"/>
    
    <!-- Nose cone -->
    <ellipse cx="320" cy="350" rx="40" ry="60" fill="#3a4552"/>
    
    <!-- Tail -->
    <polygon points="850,320 900,250 920,260 880,340 850,340" fill="#3a4552"/>
    <polygon points="850,380 900,450 920,440 880,360 850,360" fill="#3a4552"/>
    
    <!-- Wings -->
    <polygon points="500,350 350,280 320,290 480,360" fill="#2a3442" opacity="0.7"/>
    <polygon points="500,350 350,420 320,410 480,340" fill="#2a3442" opacity="0.7"/>
    
    <!-- Engine -->
    <ellipse cx="720" cy="300" rx="35" ry="45" fill="#1a1f2e"/>
    <ellipse cx="720" cy="400" rx="35" ry="45" fill="#1a1f2e"/>
    
    <!-- Windows -->
    <circle cx="420" cy="345" r="12" fill="#0ea5e9" opacity="0.6"/>
    <circle cx="460" cy="345" r="12" fill="#0ea5e9" opacity="0.6"/>
    <circle cx="500" cy="345" r="12" fill="#0ea5e9" opacity="0.6"/>
    <circle cx="540" cy="345" r="12" fill="#0ea5e9" opacity="0.6"/>
    <circle cx="580" cy="345" r="12" fill="#0ea5e9" opacity="0.6"/>
  </g>
  
  <!-- FBI Badge silhouette (watermark) -->
  <g opacity="0.08">
    <circle cx="950" cy="480" r="100" fill="none" stroke="#ffd700" stroke-width="4"/>
    <text x="950" y="470" fill="#ffd700" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle">FBI</text>
    <text x="950" y="510" fill="#ffd700" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">DEPARTMENT OF JUSTICE</text>
  </g>
  
  <!-- Evidence markers -->
  <g opacity="0.5">
    <circle cx="280" cy="480" r="40" fill="none" stroke="#ffff00" stroke-width="3"/>
    <text x="280" y="490" fill="#ffff00" font-family="Arial, sans-serif" font-size="30" font-weight="bold" text-anchor="middle">A</text>
    
    <circle cx="820" cy="220" r="35" fill="none" stroke="#ffff00" stroke-width="3"/>
    <text x="820" y="230" fill="#ffff00" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">B</text>
  </g>
  
  <!-- Main title -->
  <g filter="url(#redGlow)">
    <text x="80" y="120" fill="url(#titleGlow)" font-family="'Arial Black', Arial, sans-serif" font-size="78" font-weight="900" letter-spacing="2">TERMINAL</text>
    <text x="80" y="190" fill="url(#titleGlow)" font-family="'Arial Black', Arial, sans-serif" font-size="78" font-weight="900" letter-spacing="2">VELOCITY</text>
  </g>
  
  <!-- Subtitle -->
  <rect x="80" y="210" width="450" height="4" fill="#ffd700"/>
  <text x="80" y="250" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="28" font-weight="bold">FBI MURDER MYSTERY</text>
  <text x="80" y="285" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">Interactive Investigation</text>
  
  <!-- Case file stamp -->
  <g opacity="0.7">
    <rect x="80" y="520" width="300" height="80" rx="6" fill="#0a0a0a" stroke="#ff0000" stroke-width="3"/>
    <text x="230" y="555" fill="#ff0000" font-family="'Courier New', monospace" font-size="16" font-weight="bold" text-anchor="middle">⚠ CLASSIFIED ⚠</text>
    <text x="230" y="585" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="20" font-weight="bold" text-anchor="middle">CASE #TGV-2026-47</text>
  </g>
  
  <!-- Crime scene tape (bottom) -->
  <rect x="0" y="590" width="1200" height="40" fill="#ffd700" opacity="0.3"/>
  <text x="600" y="618" fill="#000" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">⚠ ACTIVE INVESTIGATION - DO NOT CROSS ⚠ ACTIVE INVESTIGATION ⚠</text>
  
  <!-- Blood spatter detail (subtle) -->
  <g opacity="0.15">
    <circle cx="950" cy="150" r="8" fill="#8a0000"/>
    <circle cx="970" cy="165" r="5" fill="#8a0000"/>
    <circle cx="935" cy="175" r="6" fill="#8a0000"/>
    <ellipse cx="920" cy="140" rx="4" ry="8" fill="#8a0000" transform="rotate(45 920 140)"/>
  </g>
  
</svg>
