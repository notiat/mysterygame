<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a88c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4987c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Interrogation room background -->
  <rect width="400" height="500" fill="url(#spotlight)"/>
  
  <!-- Dramatic side lighting effect -->
  <rect x="280" y="0" width="120" height="500" fill="#1a1a1a" opacity="0.7"/>
  
  <!-- Subject: Chloe Evans - Confident, almost smug -->
  
  <!-- Neck/shoulders -->
  <path d="M 150 420 Q 170 400 200 390 Q 230 400 250 420 L 260 500 L 140 500 Z" 
        fill="url(#skinTone)" opacity="0.9"/>
  
  <!-- Dark blazer -->
  <path d="M 140 450 L 150 420 Q 170 410 200 405 Q 230 410 250 420 L 260 450 L 270 500 L 130 500 Z"
        fill="#1a1a2a" stroke="#2a2a3a" stroke-width="2"/>
  
  <!-- White collar -->
  <path d="M 175 415 L 185 405 L 200 400 L 215 405 L 225 415" 
        fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  
  <!-- Head/face - slightly tilted, confident -->
  <ellipse cx="200" cy="280" rx="70" ry="90" fill="url(#skinTone)"/>
  
  <!-- Hair - professional bun -->
  <ellipse cx="200" cy="220" rx="75" ry="60" fill="#3d2817"/>
  <ellipse cx="200" cy="235" rx="72" ry="55" fill="#4d3827"/>
  <circle cx="200" cy="190" r="22" fill="#3d2817"/>
  
  <!-- Facial features - confident expression -->
  <!-- Left eye - direct gaze -->
  <ellipse cx="175" cy="268" rx="12" ry="9" fill="#2a2a2a"/>
  <ellipse cx="177" cy="267" rx="5" ry="5" fill="#1a1a1a"/>
  <ellipse cx="179" cy="266" rx="2" ry="2" fill="#ffffff" opacity="0.8"/>
  
  <!-- Right eye - direct gaze -->
  <ellipse cx="225" cy="268" rx="12" ry="9" fill="#2a2a2a"/>
  <ellipse cx="227" cy="267" rx="5" ry="5" fill="#1a1a1a"/>
  <ellipse cx="229" cy="266" rx="2" ry="2" fill="#ffffff" opacity="0.8"/>
  
  <!-- Eyebrows - slightly raised, confident -->
  <path d="M 163 255 Q 175 252 187 254" fill="none" stroke="#2a1a0a" stroke-width="3" stroke-linecap="round"/>
  <path d="M 213 254 Q 225 252 237 255" fill="none" stroke="#2a1a0a" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 200 275 L 197 295 L 200 298 L 203 295 Z" fill="#c4987c" opacity="0.6"/>
  <ellipse cx="193" cy="297" rx="3" ry="2" fill="#a47860" opacity="0.4"/>
  <ellipse cx="207" cy="297" rx="3" ry="2" fill="#a47860" opacity="0.4"/>
  
  <!-- Mouth - subtle smirk, confident -->
  <path d="M 185 318 Q 200 322 215 318" fill="none" stroke="#8d6854" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 210 318 Q 215 320 217 318" fill="none" stroke="#8d6854" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Cheekbone definition -->
  <ellipse cx="160" cy="293" rx="15" ry="25" fill="#b48770" opacity="0.3" transform="rotate(-15 160 293)"/>
  <ellipse cx="240" cy="293" rx="15" ry="25" fill="#b48770" opacity="0.3" transform="rotate(15 240 293)"/>
  
  <!-- Earrings -->
  <circle cx="135" cy="285" r="4" fill="#d4af37" opacity="0.8"/>
  <circle cx="265" cy="285" r="4" fill="#d4af37" opacity="0.8"/>
  
  <!-- Makeup -->
  <ellipse cx="175" cy="265" rx="8" ry="2" fill="#8d5844" opacity="0.25"/>
  <ellipse cx="225" cy="265" rx="8" ry="2" fill="#8d5844" opacity="0.25"/>
  
  <!-- Shadow under chin -->
  <ellipse cx="200" cy="360" rx="40" ry="15" fill="#000000" opacity="0.2"/>
  
  <!-- Name plate -->
  <rect x="20" y="450" width="360" height="45" fill="#1a1a1a" stroke="#ff6666" stroke-width="2"/>
  <text x="200" y="472" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    CHLOE EVANS
  </text>
  <text x="200" y="488" font-family="Arial, sans-serif" font-size="12" fill="#ff6666" text-anchor="middle">
    EXECUTIVE ASSISTANT • CONFIDENT
  </text>
</svg>