<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a070;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c49060;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Interrogation room background -->
  <rect width="400" height="500" fill="url(#spotlight)"/>
  
  <!-- Dramatic side lighting -->
  <rect x="0" y="0" width="120" height="500" fill="#1a1a1a" opacity="0.6"/>
  
  <!-- Subject: Julian Ricci - Flight Attendant, charismatic -->
  
  <!-- Neck/shoulders -->
  <path d="M 145 430 Q 165 410 200 400 Q 235 410 255 430 L 265 500 L 135 500 Z" 
        fill="url(#skinTone)" opacity="0.9"/>
  
  <!-- Flight attendant uniform - navy blue -->
  <path d="M 135 460 L 145 430 Q 165 415 200 410 Q 235 415 255 430 L 265 460 L 275 500 L 125 500 Z"
        fill="#1a2844" stroke="#2a3854" stroke-width="2"/>
  
  <!-- White shirt collar -->
  <path d="M 170 420 L 180 410 L 200 405 L 220 410 L 230 420" 
        fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  
  <!-- Tie - airline colors (navy with gold stripe) -->
  <path d="M 200 405 L 198 430 L 196 460 L 195 480 L 200 485 L 205 480 L 204 460 L 202 430 Z"
        fill="#1a2844" stroke="#d4af37" stroke-width="1"/>
  
  <!-- Head/face -->
  <ellipse cx="200" cy="285" rx="72" ry="88" fill="url(#skinTone)"/>
  
  <!-- Hair - stylish, short sides, longer on top (Italian style) -->
  <ellipse cx="200" cy="225" rx="73" ry="55" fill="#2a1a0a"/>
  <ellipse cx="200" cy="235" rx="70" ry="50" fill="#3a2a1a"/>
  <!-- Styled quiff -->
  <path d="M 170 215 Q 200 200 230 215" fill="#3a2a1a"/>
  
  <!-- Facial features - open, friendly expression -->
  <!-- Left eye -->
  <ellipse cx="175" cy="275" rx="12" ry="9" fill="#2a1a0a"/>
  <ellipse cx="177" cy="274" rx="5" ry="5" fill="#1a1a1a"/>
  <ellipse cx="179" cy="273" rx="2" ry="2" fill="#ffffff" opacity="0.7"/>
  
  <!-- Right eye -->
  <ellipse cx="225" cy="275" rx="12" ry="9" fill="#2a1a0a"/>
  <ellipse cx="227" cy="274" rx="5" ry="5" fill="#1a1a1a"/>
  <ellipse cx="229" cy="273" rx="2" ry="2" fill="#ffffff" opacity="0.7"/>
  
  <!-- Eyebrows - expressive, friendly -->
  <path d="M 160 263 Q 173 260 186 262" fill="none" stroke="#2a1a0a" stroke-width="3" stroke-linecap="round"/>
  <path d="M 214 262 Q 227 260 240 263" fill="none" stroke="#2a1a0a" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 200 280 L 197 300 L 200 303 L 203 300 Z" fill="#c49060" opacity="0.6"/>
  <ellipse cx="193" cy="302" rx="3" ry="2" fill="#a47050" opacity="0.4"/>
  <ellipse cx="207" cy="302" rx="3" ry="2" fill="#a47050" opacity="0.4"/>
  
  <!-- Mouth - neutral, professional smile -->
  <path d="M 183 325 Q 200 328 217 325" fill="none" stroke="#8d5844" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Stubble/5 o'clock shadow -->
  <ellipse cx="200" cy="335" rx="45" ry="25" fill="#2a1a0a" opacity="0.12"/>
  <ellipse cx="165" cy="310" rx="15" ry="20" fill="#2a1a0a" opacity="0.1" transform="rotate(-20 165 310)"/>
  <ellipse cx="235" cy="310" rx="15" ry="20" fill="#2a1a0a" opacity="0.1" transform="rotate(20 235 310)"/>
  
  <!-- Cheekbone definition -->
  <ellipse cx="158" cy="295" rx="14" ry="26" fill="#b48060" opacity="0.25" transform="rotate(-15 158 295)"/>
  <ellipse cx="242" cy="295" rx="14" ry="26" fill="#b48060" opacity="0.25" transform="rotate(15 242 295)"/>
  
  <!-- Shadow under chin -->
  <ellipse cx="200" cy="365" rx="42" ry="16" fill="#000000" opacity="0.2"/>
  
  <!-- Name plate -->
  <rect x="20" y="450" width="360" height="45" fill="#1a1a1a" stroke="#ffcc00" stroke-width="2"/>
  <text x="200" y="472" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    JULIAN RICCI
  </text>
  <text x="200" y="488" font-family="Arial, sans-serif" font-size="12" fill="#999999" text-anchor="middle">
    FLIGHT ATTENDANT • PROFESSIONAL
  </text>
</svg>