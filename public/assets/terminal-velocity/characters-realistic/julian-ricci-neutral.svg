<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinTone" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#e4c4a4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4b494;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4a484;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="uniform" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a4a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a3a4a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="dramaticLight">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="1000" fill="url(#bgGrad)"/>
  <ellipse cx="400" cy="250" rx="350" ry="400" fill="url(#dramaticLight)"/>
  
  <g filter="url(#shadow)">
    <!-- Flight attendant uniform -->
    <ellipse cx="400" cy="850" rx="320" ry="200" fill="url(#uniform)"/>
    <rect x="80" y="700" width="640" height="300" fill="url(#uniform)"/>
    
    <!-- White shirt collar -->
    <path d="M 350 750 L 380 820 L 420 820 L 450 750 Z" fill="#f0f0f0"/>
    
    <!-- Tie -->
    <rect x="385" y="760" width="30" height="120" fill="#1a2a3a"/>
    
    <!-- Neck -->
    <ellipse cx="400" cy="740" rx="45" ry="60" fill="url(#skinTone)"/>
    
    <!-- Head/Face -->
    <ellipse cx="400" cy="450" rx="160" ry="200" fill="url(#skinTone)"/>
    
    <!-- Ears -->
    <ellipse cx="250" cy="450" rx="25" ry="35" fill="#d4b494"/>
    <ellipse cx="550" cy="450" rx="25" ry="35" fill="#d4b494"/>
    
    <!-- Hair (dark, styled) -->
    <ellipse cx="400" cy="280" rx="170" ry="100" fill="#2a2a2a"/>
    <ellipse cx="350" cy="320" rx="90" ry="70" fill="#2a2a2a"/>
    <ellipse cx="450" cy="320" rx="90" ry="70" fill="#2a2a2a"/>
    <ellipse cx="400" cy="350" rx="140" ry="60" fill="#2a2a2a"/>
    
    <!-- Eyebrows -->
    <path d="M 310 410 Q 330 405 350 408" fill="none" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
    <path d="M 450 408 Q 470 405 490 410" fill="none" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
    
    <!-- Eyes (friendly, open) -->
    <ellipse cx="330" cy="445" rx="30" ry="20" fill="#ffffff"/>
    <ellipse cx="470" cy="445" rx="30" ry="20" fill="#ffffff"/>
    <circle cx="328" cy="445" r="15" fill="#4a6a4a"/>
    <circle cx="472" cy="445" r="15" fill="#4a6a4a"/>
    <circle cx="325" cy="443" r="8" fill="#000000"/>
    <circle cx="475" cy="443" r="8" fill="#000000"/>
    <circle cx="322" cy="440" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="478" cy="440" r="3" fill="#ffffff" opacity="0.8"/>
    
    <!-- Nose -->
    <ellipse cx="400" cy="490" rx="18" ry="35" fill="#c4a484"/>
    
    <!-- Mouth (slight smile) -->
    <ellipse cx="400" cy="560" rx="45" ry="14" fill="#c49484"/>
    <path d="M 360 560 Q 400 568 440 560" fill="none" stroke="#a47464" stroke-width="2"/>
    
    <!-- Jaw -->
    <ellipse cx="400" cy="650" rx="130" ry="60" fill="url(#skinTone)"/>
  </g>
  
  <!-- Name plate -->
  <rect x="50" y="850" width="700" height="120" rx="8" fill="#0a0a0a" stroke="#4a90e2" stroke-width="4" opacity="0.95"/>
  <text x="400" y="895" fill="#e8e8e8" font-family="Arial" font-size="36" font-weight="bold" text-anchor="middle">JULIAN RICCI</text>
  <text x="400" y="935" fill="#94a3b8" font-family="Arial" font-size="22" text-anchor="middle">Flight Attendant</text>
  <text x="400" y="960" fill="#7f8c8d" font-family="'Courier New'" font-size="16" text-anchor="middle">29 years | Charismatic | Defensive</text>
  
  <rect x="50" y="50" width="250" height="80" rx="6" fill="#4a90e2" opacity="0.9"/>
  <text x="175" y="80" fill="#fff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">RED HERRING</text>
  <text x="175" y="110" fill="#fff" font-family="'Courier New'" font-size="20" font-weight="bold" text-anchor="middle">INNOCENT</text>
  
</svg>
