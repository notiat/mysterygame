<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b89878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a88868;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Interrogation room background -->
  <rect width="400" height="500" fill="url(#spotlight)"/>
  
  <!-- Overhead FBI hangar lighting -->
  <rect x="0" y="0" width="400" height="200" fill="#2a2a2a" opacity="0.3"/>
  
  <!-- Subject: Agent Torres - FBI Special Agent, authoritative briefing -->
  
  <!-- Neck/shoulders -->
  <path d="M 140 430 Q 165 410 200 400 Q 235 410 260 430 L 275 500 L 125 500 Z" 
        fill="url(#skinTone)" opacity="0.9"/>
  
  <!-- FBI windbreaker/tactical jacket - navy blue with FBI logo -->
  <path d="M 125 465 L 140 430 Q 165 415 200 410 Q 235 415 260 430 L 275 465 L 290 500 L 110 500 Z"
        fill="#0a1a2a" stroke="#1a2a3a" stroke-width="2"/>
  
  <!-- FBI logo patch on chest -->
  <rect x="165" y="425" width="30" height="35" rx="2" fill="#ffcc00" opacity="0.9"/>
  <text x="180" y="440" font-family="Arial Black, sans-serif" font-size="14" font-weight="bold" fill="#0a1a2a" text-anchor="middle">FBI</text>
  <rect x="165" y="445" width="30" height="2" fill="#0a1a2a"/>
  <text x="180" y="456" font-family="Arial, sans-serif" font-size="6" fill="#0a1a2a" text-anchor="middle">FEDERAL</text>
  
  <!-- High collar/zipper -->
  <rect x="198" y="405" width="4" height="55" fill="#888888"/>
  
  <!-- Head/face - authoritative, professional -->
  <ellipse cx="200" cy="285" rx="70" ry="88" fill="url(#skinTone)"/>
  
  <!-- Hair - short, professional cut with slight gray at temples -->
  <ellipse cx="200" cy="225" rx="72" ry="55" fill="#2a2a2a"/>
  <ellipse cx="200" cy="238" rx="70" ry="50" fill="#3a3a3a"/>
  <!-- Gray temples -->
  <ellipse cx="150" cy="240" rx="15" ry="25" fill="#808080" opacity="0.5"/>
  <ellipse cx="250" cy="240" rx="15" ry="25" fill="#808080" opacity="0.5"/>
  
  <!-- Facial features - stern, professional FBI agent -->
  <!-- Left eye - direct, authoritative gaze -->
  <ellipse cx="175" cy="275" rx="11" ry="8" fill="#2a1a0a"/>
  <ellipse cx="177" cy="274" rx="4" ry="4" fill="#1a1a1a"/>
  <ellipse cx="179" cy="273" rx="2" ry="2" fill="#ffffff" opacity="0.6"/>
  
  <!-- Right eye - direct, authoritative gaze -->
  <ellipse cx="225" cy="275" rx="11" ry="8" fill="#2a1a0a"/>
  <ellipse cx="227" cy="274" rx="4" ry="4" fill="#1a1a1a"/>
  <ellipse cx="229" cy="273" rx="2" ry="2" fill="#ffffff" opacity="0.6"/>
  
  <!-- Eyebrows - strong, authoritative -->
  <path d="M 160 263 Q 175 261 190 263" fill="none" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 210 263 Q 225 261 240 263" fill="none" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Nose - strong, defined -->
  <path d="M 200 280 L 197 302 L 200 306 L 203 302 Z" fill="#a88868" opacity="0.6"/>
  <ellipse cx="192" cy="304" rx="4" ry="2" fill="#987858" opacity="0.4"/>
  <ellipse cx="208" cy="304" rx="4" ry="2" fill="#987858" opacity="0.4"/>
  
  <!-- Mouth - firm, authoritative line -->
  <path d="M 183 327 Q 200 328 217 327" fill="none" stroke="#887858" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Well-groomed mustache (optional but adds authority) -->
  <path d="M 185 320 Q 200 322 215 320" fill="#2a2a2a" opacity="0.7"/>
  <ellipse cx="190" cy="320" rx="8" ry="3" fill="#2a2a2a" opacity="0.7"/>
  <ellipse cx="210" cy="320" rx="8" ry="3" fill="#2a2a2a" opacity="0.7"/>
  
  <!-- Clean shaven/5 o'clock shadow -->
  <ellipse cx="200" cy="340" rx="48" ry="26" fill="#2a2a2a" opacity="0.08"/>
  
  <!-- Jaw definition - strong, masculine -->
  <path d="M 148 345 L 153 360 L 160 372" fill="none" stroke="#887858" stroke-width="2" opacity="0.3"/>
  <path d="M 252 345 L 247 360 L 240 372" fill="none" stroke="#887858" stroke-width="2" opacity="0.3"/>
  
  <!-- Crow's feet (experience lines) -->
  <path d="M 188 275 Q 190 277 192 275" fill="none" stroke="#887858" stroke-width="1" opacity="0.4"/>
  <path d="M 208 275 Q 210 277 212 275" fill="none" stroke="#887858" stroke-width="1" opacity="0.4"/>
  
  <!-- Cheekbone definition -->
  <ellipse cx="157" cy="297" rx="13" ry="25" fill="#987858" opacity="0.2" transform="rotate(-15 157 297)"/>
  <ellipse cx="243" cy="297" rx="13" ry="25" fill="#987858" opacity="0.2" transform="rotate(15 243 297)"/>
  
  <!-- Shadow under chin -->
  <ellipse cx="200" cy="365" rx="44" ry="17" fill="#000000" opacity="0.25"/>
  
  <!-- Radio earpiece (FBI communications) -->
  <circle cx="130" cy="280" r="4" fill="#1a1a1a"/>
  <path d="M 130 280 L 125 278" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Name plate -->
  <rect x="20" y="450" width="360" height="45" fill="#0a1a2a" stroke="#ffcc00" stroke-width="3"/>
  <text x="200" y="472" font-family="Arial Black, sans-serif" font-size="18" font-weight="bold" fill="#ffcc00" text-anchor="middle">
    SPECIAL AGENT TORRES
  </text>
  <text x="200" y="488" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
    FBI • ALASKA FIELD OFFICE
  </text>
</svg>