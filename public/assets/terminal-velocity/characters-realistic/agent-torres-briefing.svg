<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinTone" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a484;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c49474;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b48464;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="dramaticLight">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="1000" fill="url(#bgGrad)"/>
  <ellipse cx="400" cy="250" rx="350" ry="400" fill="url(#dramaticLight)"/>
  
  <g filter="url(#shadow)">
    <!-- Black suit -->
    <ellipse cx="400" cy="850" rx="320" ry="200" fill="url(#suit)"/>
    <rect x="80" y="700" width="640" height="300" fill="url(#suit)"/>
    
    <!-- White shirt collar -->
    <path d="M 350 750 L 380 820 L 420 820 L 450 750 Z" fill="#f0f0f0"/>
    
    <!-- Dark tie (FBI) -->
    <rect x="385" y="760" width="30" height="120" fill="#0a0a0a"/>
    <polygon points="400,750 385,760 415,760" fill="#1a1a1a"/>
    
    <!-- FBI badge (subtle, on suit) -->
    <g opacity="0.6">
      <rect x="150" y="780" width="50" height="60" rx="4" fill="#ffd700" stroke="#d4a500" stroke-width="2"/>
      <text x="175" y="805" fill="#1a1a1a" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">FBI</text>
    </g>
    
    <!-- Neck -->
    <ellipse cx="400" cy="740" rx="45" ry="60" fill="url(#skinTone)"/>
    
    <!-- Head/Face -->
    <ellipse cx="400" cy="450" rx="160" ry="200" fill="url(#skinTone)"/>
    
    <!-- Ears -->
    <ellipse cx="250" cy="450" rx="25" ry="35" fill="#c49474"/>
    <ellipse cx="550" cy="450" rx="25" ry="35" fill="#c49474"/>
    
    <!-- Hair (short, professional, graying) -->
    <ellipse cx="400" cy="280" rx="170" ry="100" fill="#3a3a3a"/>
    <ellipse cx="350" cy="320" rx="90" ry="70" fill="#3a3a3a"/>
    <ellipse cx="450" cy="320" rx="90" ry="70" fill="#3a3a3a"/>
    <ellipse cx="400" cy="350" rx="140" ry="60" fill="#3a3a3a"/>
    <!-- Gray streaks -->
    <ellipse cx="380" cy="310" rx="20" ry="40" fill="#6a6a6a" opacity="0.5"/>
    <ellipse cx="420" cy="310" rx="20" ry="40" fill="#6a6a6a" opacity="0.5"/>
    
    <!-- Eyebrows (serious, authoritative) -->
    <path d="M 310 410 Q 330 408 350 410" fill="none" stroke="#2a2a2a" stroke-width="8" stroke-linecap="round"/>
    <path d="M 450 410 Q 470 408 490 410" fill="none" stroke="#2a2a2a" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Eyes (serious, experienced) -->
    <ellipse cx="330" cy="445" rx="30" ry="20" fill="#ffffff"/>
    <ellipse cx="470" cy="445" rx="30" ry="20" fill="#ffffff"/>
    <circle cx="328" cy="445" r="15" fill="#4a4a3a"/>
    <circle cx="472" cy="445" r="15" fill="#4a4a3a"/>
    <circle cx="325" cy="443" r="8" fill="#000000"/>
    <circle cx="475" cy="443" r="8" fill="#000000"/>
    <circle cx="322" cy="440" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="478" cy="440" r="3" fill="#ffffff" opacity="0.8"/>
    
    <!-- Nose -->
    <ellipse cx="400" cy="490" rx="20" ry="35" fill="#b48464"/>
    
    <!-- Mouth (firm, professional) -->
    <ellipse cx="400" cy="560" rx="40" ry="10" fill="#b47464"/>
    <line x1="365" y1="560" x2="435" y2="560" stroke="#945454" stroke-width="2.5"/>
    
    <!-- Jaw (strong) -->
    <ellipse cx="400" cy="650" rx="135" ry="65" fill="url(#skinTone)"/>
  </g>
  
  <!-- Name plate -->
  <rect x="50" y="850" width="700" height="120" rx="8" fill="#0a0a0a" stroke="#ffd700" stroke-width="4" opacity="0.95"/>
  <text x="400" y="895" fill="#e8e8e8" font-family="Arial" font-size="36" font-weight="bold" text-anchor="middle">AGENT TORRES</text>
  <text x="400" y="935" fill="#94a3b8" font-family="Arial" font-size="22" text-anchor="middle">FBI Special Agent - Alaska Division</text>
  <text x="400" y="960" fill="#7f8c8d" font-family="'Courier New'" font-size="16" text-anchor="middle">42 years | 18 years service | Lead Investigator</text>
  
  <rect x="50" y="50" width="250" height="80" rx="6" fill="#ffd700" opacity="0.9"/>
  <text x="175" y="80" fill="#000" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">FBI LEAD</text>
  <text x="175" y="110" fill="#000" font-family="'Courier New'" font-size="20" font-weight="bold" text-anchor="middle">INVESTIGATOR</text>
  
</svg>
