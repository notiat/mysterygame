    <text x="320" y="430" fill="#333" font-family="Arial" font-size="14">Allergen: PEANUTS / TREE NUTS / SESAME</text>
    <text x="320" y="455" fill="#333" font-family="Arial" font-size="14">Reaction: ANAPHYLAXIS (Life-threatening)</text>
    
    <rect x="320" y="470" width="380" height="1" fill="#ddd"/>
    
    <text x="320" y="495" fill="#333" font-family="Arial" font-size="13" font-weight="bold">Emergency Treatment:</text>
    <text x="320" y="515" fill="#000" font-family="Arial" font-size="12">1. Administer EpiPen immediately</text>
    <text x="320" y="535" fill="#000" font-family="Arial" font-size="12">2. Call 911</text>
    <text x="320" y="555" fill="#000" font-family="Arial" font-size="12">3. Second dose if no improvement in 5-10 min</text>
    
    <rect x="550" y="490" width="140" height="60" fill="#fff5f5" stroke="#e74c3c" stroke-width="2" rx="4"/>
    <text x="620" y="515" fill="#e74c3c" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">CARRIES</text>
    <text x="620" y="535" fill="#e74c3c" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">EPIPEN</text>
    <text x="620" y="550" fill="#e74c3c" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">AT ALL TIMES</text>
  </g>
  
  <circle cx="680" cy="380" r="50" fill="none" stroke="#ff00ff" stroke-width="4" stroke-dasharray="10,5"/>
  
  <rect x="50" y="600" width="550" height="120" rx="6" fill="#0a0a0a" stroke="#e74c3c" stroke-width="2" opacity="0.95"/>
  <text x="325" y="630" fill="#e74c3c" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">SIGNIFICANCE</text>
  <text x="70" y="655" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Victim's known allergy: Sesame (anaphylaxis risk)</text>
  <text x="70" y="675" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Always carries EpiPen - makes "accidental" exposure unlikely</text>
