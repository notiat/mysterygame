<svg width="1024" height="768" viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="deskBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1024" height="768" fill="url(#deskBg)"/>
  
  <rect x="50" y="50" width="220" height="85" rx="4" fill="#0a0a0a" stroke="#e74c3c" stroke-width="3" opacity="0.95"/>
  <text x="160" y="80" fill="#e74c3c" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">MEDICAL</text>
  <text x="160" y="115" fill="#e74c3c" font-family="'Courier New', monospace" font-size="26" font-weight="bold" text-anchor="middle">M-01</text>
  
  <g filter="url(#cardShadow)">
    <rect x="300" y="250" width="420" height="280" rx="12" fill="#ffffff" stroke="#ccc" stroke-width="2"/>
    
    <rect x="300" y="250" width="420" height="60" rx="12" fill="#e74c3c"/>
    <text x="510" y="290" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">⚠ MEDICAL ALERT ⚠</text>
    
    <text x="320" y="340" fill="#333" font-family="Arial" font-size="14" font-weight="bold">Patient Name:</text>
    <text x="320" y="365" fill="#000" font-family="Arial" font-size="18" font-weight="bold">ALEXANDER JAMES STEELE</text>
    
    <rect x="320" y="380" width="380" height="1" fill="#ddd"/>
    
