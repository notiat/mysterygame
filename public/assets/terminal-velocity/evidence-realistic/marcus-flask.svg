<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#999999;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#6d3410;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Evidence table -->
  <rect x="0" y="450" width="800" height="150" fill="#1a1a1a" opacity="0.6"/>
  
  <!-- Hip flask - stainless steel -->
  <g filter="url(#shadow)">
    <!-- Flask body -->
    <path d="M 340 180 
             Q 335 190 333 210 L 330 250 L 328 310 L 327 370 L 328 430 L 330 480
             Q 332 495 345 500 Q 360 505 400 505 Q 440 505 455 500 Q 468 495 470 480
             L 472 430 L 473 370 L 472 310 L 470 250 L 467 210 Q 465 190 460 180
             Q 455 170 440 165 Q 420 160 400 160 Q 380 160 360 165 Q 345 170 340 180 Z"
          fill="url(#metal)" stroke="#666" stroke-width="2"/>
    
    <!-- Curved body shape highlight -->
    <ellipse cx="400" cy="340" rx="55" ry="140" fill="#d8d8d8" opacity="0.4"/>
    <ellipse cx="375" cy="300" rx="25" ry="100" fill="#ffffff" opacity="0.5"/>
    
    <!-- Engraving: "M.S." -->
    <text x="378" y="290" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#555" font-style="italic">M.S.</text>
    
    <!-- Flask cap/top -->
    <rect x="375" y="145" width="50" height="20" rx="3" fill="url(#metal)" stroke="#666" stroke-width="2"/>
    <rect x="385" y="135" width="30" height="15" rx="2" fill="#999" stroke="#555" stroke-width="1.5"/>
    
    <!-- Liquid visible through opening (cap slightly ajar) -->
    <ellipse cx="400" cy="145" rx="12" ry="6" fill="url(#liquid)" opacity="0.8"/>
    
    <!-- Wear marks and scratches -->
    <line x1="350" y1="250" x2="355" y2="270" stroke="#888" stroke-width="0.5" opacity="0.6"/>
    <line x1="445" y1="320" x2="450" y2="345" stroke="#888" stroke-width="0.5" opacity="0.6"/>
    <line x1="365" y1="400" x2="370" y2="415" stroke="#888" stroke-width="0.5" opacity="0.5"/>
    
    <!-- Fingerprint smudges -->
    <ellipse cx="420" cy="380" rx="18" ry="25" fill="#333" opacity="0.2"/>
    <ellipse cx="385" cy="420" rx="20" ry="22" fill="#333" opacity="0.18"/>
  </g>
  
  <!-- Evidence markers -->
  <g>
    <!-- Engraving marker -->
    <circle cx="420" cy="280" r="35" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="455" y1="275" x2="490" y2="250" stroke="#ffcc00" stroke-width="1.5"/>
    <text x="495" y="255" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffcc00">A</text>
    
    <!-- Liquid marker -->
    <circle cx="400" cy="145" r="20" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="380" y1="140" x2="340" y2="120" stroke="#ffcc00" stroke-width="1.5"/>
    <text x="310" y="125" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffcc00">B</text>
  </g>
  
  <!-- Evidence tag -->
  <g>
    <rect x="480" y="160" width="260" height="200" fill="#1a1a1a" stroke="#ffcc00" stroke-width="2" opacity="0.95"/>
    <text x="495" y="185" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#ffcc00">EVIDENCE #063</text>
    <line x1="495" y1="190" x2="725" y2="190" stroke="#333" stroke-width="1"/>
    
    <text x="495" y="212" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Item: Hip Flask</text>
    <text x="495" y="232" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Location: Marcus Stone's</text>
    <text x="495" y="248" font-family="Arial, sans-serif" font-size="12" fill="#ccc">          quarters (drawer)</text>
    
    <line x1="495" y1="258" x2="725" y2="258" stroke="#444" stroke-width="1"/>
    
    <text x="495" y="278" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker A:</text>
    <text x="495" y="293" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Engraving "M.S."</text>
    
    <text x="495" y="313" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker B:</text>
    <text x="495" y="328" font-family="Arial, sans-serif" font-size="10" fill="#ff9999">Contents: Whiskey</text>
    <text x="495" y="343" font-family="Arial, sans-serif" font-size="9" fill="#999">40% ABV, 4 oz remaining</text>
  </g>
  
  <!-- Additional notes -->
  <g>
    <rect x="100" y="360" width="190" height="90" fill="#1a1a1a" stroke="#666" stroke-width="1" opacity="0.9"/>
    <text x="110" y="380" font-family="Arial, sans-serif" font-size="10" fill="#ff9999" font-weight="bold">⚠ NOTE:</text>
    <text x="110" y="398" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Flask recovered from</text>
    <text x="110" y="413" font-family="Arial, sans-serif" font-size="9" fill="#ccc">bodyguard's quarters</text>
    <text x="110" y="428" font-family="Arial, sans-serif" font-size="9" fill="#ccc">during time of death</text>
  </g>
  
  <!-- Scale reference -->
  <g>
    <rect x="100" y="530" width="100" height="15" fill="#333"/>
    <rect x="100" y="530" width="50" height="15" fill="#ffcc00"/>
    <text x="105" y="542" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold">0</text>
    <text x="145" y="542" font-family="Arial, sans-serif" font-size="10" fill="#ccc">5 cm</text>
  </g>
  
  <!-- Photo metadata -->
  <text x="550" y="580" font-family="Courier New, monospace" font-size="10" fill="#666">CSI-TV-2026-03-14_063_FLASK_MS.JPG</text>
</svg>