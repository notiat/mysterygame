<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="engraving" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#888888;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#666666;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Evidence table -->
  <rect x="0" y="400" width="800" height="200" fill="#1a1a1a" opacity="0.5"/>
  
  <!-- Cigarette case - elegant silver -->
  <g filter="url(#shadow)">
    <!-- Case body (closed) -->
    <rect x="260" y="200" width="280" height="180" rx="12" fill="url(#silver)" stroke="#999" stroke-width="3"/>
    
    <!-- Top highlight/shine -->
    <rect x="265" y="205" width="270" height="170" rx="10" fill="url(#shine)" opacity="0.8"/>
    
    <!-- Panel edge/seam (case halves) -->
    <line x1="260" y1="290" x2="540" y2="290" stroke="#aaa" stroke-width="2" opacity="0.7"/>
    
    <!-- Decorative border pattern -->
    <rect x="275" y="215" width="250" height="150" rx="8" fill="none" stroke="url(#engraving)" stroke-width="1.5" opacity="0.6"/>
    <rect x="280" y="220" width="240" height="140" rx="6" fill="none" stroke="url(#engraving)" stroke-width="1" opacity="0.4"/>
    
    <!-- Art Deco corner details -->
    <path d="M 285 230 L 295 230 L 285 240 Z" fill="#999" opacity="0.5"/>
    <path d="M 515 230 L 505 230 L 515 240 Z" fill="#999" opacity="0.5"/>
    <path d="M 285 350 L 295 350 L 285 340 Z" fill="#999" opacity="0.5"/>
    <path d="M 515 350 L 505 350 L 515 340 Z" fill="#999" opacity="0.5"/>
    
    <!-- Monogram engraving: "C.E." (Chloe Evans) -->
    <g>
      <text x="400" y="275" font-family="Brush Script MT, cursive" font-size="48" fill="url(#engraving)" text-anchor="middle" font-weight="bold" opacity="0.8">C.E.</text>
      <ellipse cx="400" cy="260" rx="55" ry="45" fill="none" stroke="url(#engraving)" stroke-width="1.5" opacity="0.5"/>
    </g>
    
    <!-- Clasp/latch -->
    <rect x="395" y="195" width="10" height="15" rx="2" fill="#b0b0b0" stroke="#888" stroke-width="1"/>
    <circle cx="400" cy="202" r="3" fill="#888"/>
    
    <!-- Wear marks and patina -->
    <ellipse cx="310" cy="250" rx="20" ry="15" fill="#aaa" opacity="0.2"/>
    <ellipse cx="490" cy="330" rx="18" ry="22" fill="#aaa" opacity="0.18"/>
    <line x1="520" y1="240" x2="525" y2="260" stroke="#999" stroke-width="0.5" opacity="0.4"/>
    <line x1="275" y1="310" x2="280" y2="330" stroke="#999" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Hinge side -->
    <rect x="257" y="285" width="8" height="10" rx="1" fill="#a0a0a0" opacity="0.7"/>
    <rect x="257" y="305" width="8" height="10" rx="1" fill="#a0a0a0" opacity="0.7"/>
  </g>
  
  <!-- Evidence markers -->
  <g>
    <!-- Monogram marker -->
    <ellipse cx="400" cy="260" rx="75" ry="60" fill="none" stroke="#ffcc00" stroke-width="2.5" stroke-dasharray="5,3"/>
    <line x1="470" y1="250" x2="520" y2="220" stroke="#ffcc00" stroke-width="2"/>
    <text x="525" y="226" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffcc00">A</text>
    
    <!-- Fingerprint location marker -->
    <circle cx="490" cy="330" r="28" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="515" y1="345" x2="555" y2="370" stroke="#ffcc00" stroke-width="1.5"/>
    <text x="560" y="376" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffcc00">B</text>
  </g>
  
  <!-- Evidence tag -->
  <g>
    <rect x="80" y="140" width="280" height="200" fill="#1a1a1a" stroke="#ffcc00" stroke-width="2" opacity="0.95"/>
    <text x="95" y="165" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#ffcc00">EVIDENCE #077</text>
    <line x1="95" y1="170" x2="345" y2="170" stroke="#333" stroke-width="1"/>
    
    <text x="95" y="190" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Item: Silver Cigarette Case</text>
    <text x="95" y="208" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Owner: Chloe Evans</text>
    <text x="95" y="226" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Location: Flight attendant</text>
    <text x="95" y="242" font-family="Arial, sans-serif" font-size="12" fill="#ccc">          locker</text>
    
    <line x1="95" y1="252" x2="345" y2="252" stroke="#444" stroke-width="1"/>
    
    <text x="95" y="272" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker A:</text>
    <text x="95" y="287" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Monogram "C.E."</text>
    <text x="95" y="302" font-family="Arial, sans-serif" font-size="9" fill="#999">Personal item confirmed</text>
    
    <text x="95" y="322" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker B:</text>
    <text x="95" y="337" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Fingerprints lifted</text>
  </g>
  
  <!-- Context note -->
  <g>
    <rect x="80" y="360" width="280" height="90" fill="#1a1a1a" stroke="#666" stroke-width="2" opacity="0.9"/>
    <text x="95" y="383" font-family="Arial, sans-serif" font-size="10" fill="#999" font-weight="bold">📝 NOTE:</text>
    <text x="95" y="400" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Expensive personal item.</text>
    <text x="95" y="415" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Chloe was on duty during</text>
    <text x="95" y="430" font-family="Arial, sans-serif" font-size="9" fill="#ccc">incident. Had access to</text>
    <text x="95" y="445" font-family="Arial, sans-serif" font-size="9" fill="#ccc">galley and passenger service.</text>
  </g>
  
  <!-- Cross-reference -->
  <g>
    <rect x="420" y="420" width="300" height="110" fill="#1a1a1a" stroke="#ff6666" stroke-width="2" opacity="0.95"/>
    <text x="435" y="443" font-family="Arial, sans-serif" font-size="10" fill="#ff9999" font-weight="bold">⚠ CROSS-REFERENCE:</text>
    <text x="435" y="460" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Evidence #056: HPMC receipt</text>
    <text x="435" y="475" font-family="Arial, sans-serif" font-size="9" fill="#ccc">(Chloe ordered capsules)</text>
    <text x="435" y="494" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Evidence #059: Fingerprints</text>
    <text x="435" y="509" font-family="Arial, sans-serif" font-size="9" fill="#ccc">(Chloe's prints on syringe)</text>
    <text x="435" y="524" font-family="Arial, sans-serif" font-size="8" fill="#ff9999">Establishes means & access</text>
  </g>
  
  <!-- Scale reference -->
  <g>
    <rect x="100" y="530" width="100" height="15" fill="#333"/>
    <rect x="100" y="530" width="50" height="15" fill="#ffcc00"/>
    <text x="105" y="542" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold">0</text>
    <text x="145" y="542" font-family="Arial, sans-serif" font-size="10" fill="#ccc">5 cm</text>
  </g>
  
  <!-- Photo metadata -->
  <text x="480" y="580" font-family="Courier New, monospace" font-size="10" fill="#666">CSI-TV-2026-03-14_077_CIGARETTE_CASE.JPG</text>
</svg>