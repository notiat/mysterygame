<svg width="1024" height="768" viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4d4d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8b8b8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="spotlight">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <filter id="caseShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1024" height="768" fill="url(#bg)"/>
  <ellipse cx="512" cy="384" rx="450" ry="350" fill="url(#spotlight)"/>
  
  <rect x="50" y="50" width="220" height="85" rx="4" fill="#0a0a0a" stroke="#94a3b8" stroke-width="3" opacity="0.95"/>
  <text x="160" y="80" fill="#94a3b8" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">CHARACTER</text>
  <text x="160" y="115" fill="#94a3b8" font-family="'Courier New', monospace" font-size="26" font-weight="bold" text-anchor="middle">X-01</text>
  
  <g filter="url(#caseShadow)">
    <!-- Metal cigarette case -->
    <rect x="350" y="300" width="320" height="180" rx="12" fill="url(#metalGrad)" stroke="#a8a8a8" stroke-width="3"/>
    
    <!-- Hinge line -->
    <line x1="350" y1="390" x2="670" y2="390" stroke="#888" stroke-width="2"/>
    
    <!-- Engraved initials -->
    <g opacity="0.6">
      <text x="510" y="380" fill="#888" font-family="'Times New Roman', serif" font-size="48" font-weight="bold" font-style="italic" text-anchor="middle">C.E.</text>
    </g>
    
    <!-- Decorative border -->
    <rect x="365" y="315" width="290" height="150" rx="8" fill="none" stroke="#c8c8c8" stroke-width="1" opacity="0.5"/>
    
    <!-- Latch -->
    <rect x="505" y="298" width="10" height="15" rx="2" fill="#a8a8a8"/>
  </g>
  
  <!-- Airport lounge receipt (partially visible) -->
  <g filter="url(#caseShadow)" transform="rotate(5 600 500)">
    <rect x="480" y="480" width="240" height="120" rx="3" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="600" y="505" fill="#333" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">SKY CLUB LOUNGE</text>
    <rect x="490" y="510" width="220" height="1" fill="#ccc"/>
    <text x="500" y="530" fill="#666" font-family="'Courier New', monospace" font-size="9">Date: Nov 12, 2025</text>
    <text x="500" y="545" fill="#d32f2f" font-family="'Courier New', monospace" font-size="9" font-weight="bold">Time: 17:10 UTC</text>
    <text x="500" y="560" fill="#666" font-family="'Courier New', monospace" font-size="9">Location: ANC Terminal A</text>
    <text x="500" y="575" fill="#666" font-family="'Courier New', monospace" font-size="9">Item: Coffee</text>
    <text x="500" y="590" fill="#666" font-family="'Courier New', monospace" font-size="9">Amount: $4.50</text>
  </g>
  
  <rect x="50" y="600" width="600" height="120" rx="6" fill="#0a0a0a" stroke="#94a3b8" stroke-width="2" opacity="0.95"/>
  <text x="350" y="630" fill="#94a3b8" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">CHARACTER EVIDENCE</text>
  <text x="70" y="655" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Item: Metal cigarette case with engraved initials "C.E."</text>
  <text x="70" y="675" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Contains: Airport lounge receipt (17:10 UTC - 1.5hrs before flight)</text>
  <text x="70" y="695" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Found: In Chloe's coat pocket</text>
  <text x="70" y="715" fill="#94a3b8" font-family="'Courier New', monospace" font-size="11">Relevance: Timeline confirmation, personal item (character flavor)</text>
  
</svg>
