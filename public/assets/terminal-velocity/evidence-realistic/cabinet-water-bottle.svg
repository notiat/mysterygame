<svg width="1024" height="768" viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c8d8e8;stop-opacity:0.9" />
    </linearGradient>
    <radialGradient id="spotlight">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1024" height="768" fill="url(#bg)"/>
  <ellipse cx="512" cy="384" rx="450" ry="350" fill="url(#spotlight)"/>
  
  <rect x="50" y="50" width="220" height="85" rx="4" fill="#0a0a0a" stroke="#4a90e2" stroke-width="3" opacity="0.95"/>
  <text x="160" y="80" fill="#4a90e2" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">SUPPORTING</text>
  <text x="160" y="115" fill="#4a90e2" font-family="'Courier New', monospace" font-size="26" font-weight="bold" text-anchor="middle">S-08</text>
  
  <g filter="url(#shadow)">
    <!-- Small airline water bottle -->
    <ellipse cx="512" cy="280" rx="45" ry="15" fill="url(#bottleGrad)"/>
    <rect x="467" y="280" width="90" height="220" fill="url(#bottleGrad)" stroke="#b8d4e0" stroke-width="2"/>
    <ellipse cx="512" cy="500" rx="45" ry="15" fill="#c8d8e8"/>
    
    <!-- Open cap -->
    <rect x="487" y="255" width="50" height="30" rx="8" fill="#4a90e2"/>
    <ellipse cx="512" cy="255" rx="25" ry="10" fill="#3a8ad2"/>
    
    <!-- Water level (partially used) -->
    <rect x="472" y="380" width="80" height="110" fill="#87ceeb" opacity="0.5"/>
    <ellipse cx="512" cy="380" rx="40" ry="12" fill="#87ceeb" opacity="0.6"/>
    
    <!-- Label -->
    <rect x="480" y="340" width="64" height="50" fill="#ffffff" opacity="0.9"/>
    <text x="512" y="360" fill="#333" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">AQUA</text>
    <text x="512" y="375" fill="#666" font-family="Arial" font-size="8" text-anchor="middle">PURE WATER</text>
    <text x="512" y="387" fill="#666" font-family="Arial" font-size="7" text-anchor="middle">355mL</text>
    
    <!-- Fingerprints on bottle -->
    <g opacity="0.3">
      <ellipse cx="490" cy="420" rx="15" ry="20" fill="none" stroke="#00ff00" stroke-width="1"/>
      <ellipse cx="490" cy="420" rx="12" ry="16" fill="none" stroke="#00ff00" stroke-width="0.8"/>
    </g>
  </g>
  
  <!-- Timeline indicator -->
  <line x1="560" y1="300" x2="650" y2="240" stroke="#ffd700" stroke-width="2"/>
  <rect x="650" y="200" width="180" height="50" rx="4" fill="#0a0a0a" stroke="#ffd700" stroke-width="2"/>
  <text x="740" y="220" fill="#ffd700" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">Cap opened:</text>
  <text x="740" y="238" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">~18:40 UTC</text>
  
  <rect x="50" y="580" width="600" height="140" rx="6" fill="#0a0a0a" stroke="#4a90e2" stroke-width="2" opacity="0.95"/>
  <text x="350" y="610" fill="#4a90e2" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">SUPPORTING EVIDENCE</text>
  <text x="70" y="635" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Item: Mini water bottle (airline service size)</text>
  <text x="70" y="655" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Location: Galley shelf near bar prep area</text>
  <text x="70" y="675" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Cap opened: Shortly before 18:42 UTC (estimated)</text>
  <text x="70" y="695" fill="#ff6b6b" font-family="'Courier New', monospace" font-size="11" font-weight="bold">Significance: Supports "water splash" method from practice log</text>
  <text x="70" y="715" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Corroborates Trial 3 note: "Add water splash - neat fails"</text>
  
</svg>
