<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="plastic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e8f4f8;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e6f5;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#88d4e8;stop-opacity:0.7" />
    </linearGradient>
    <radialGradient id="cap" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6699cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4477aa;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Evidence table -->
  <rect x="0" y="450" width="800" height="150" fill="#1a1a1a" opacity="0.5"/>
  
  <!-- Water bottle -->
  <g filter="url(#shadow)">
    <!-- Cap -->
    <ellipse cx="400" cy="125" rx="35" ry="12" fill="url(#cap)"/>
    <rect x="365" y="120" width="70" height="25" fill="url(#cap)"/>
    <ellipse cx="400" cy="145" rx="35" ry="12" fill="#5588bb"/>
    
    <!-- Neck -->
    <path d="M 375 145 L 370 165 L 365 185 L 360 200" fill="url(#plastic)" opacity="0.7"/>
    <path d="M 425 145 L 430 165 L 435 185 L 440 200" fill="url(#plastic)" opacity="0.7"/>
    
    <!-- Main bottle body -->
    <ellipse cx="400" cy="200" rx="40" ry="15" fill="url(#plastic)"/>
    <rect x="360" y="200" width="80" height="260" fill="url(#plastic)"/>
    <ellipse cx="400" cy="460" rx="40" ry="15" fill="#d8e8f0"/>
    
    <!-- Water inside (partial) -->
    <ellipse cx="400" cy="280" rx="38" ry="14" fill="url(#water)"/>
    <rect x="362" y="280" width="76" height="175" fill="url(#water)"/>
    <ellipse cx="400" cy="455" rx="38" ry="14" fill="#88d4e8" opacity="0.8"/>
    
    <!-- Bottle highlights (plastic shine) -->
    <ellipse cx="375" cy="250" rx="8" ry="60" fill="#ffffff" opacity="0.6"/>
    <ellipse cx="425" cy="320" rx="6" ry="50" fill="#ffffff" opacity="0.4"/>
    
    <!-- Label area -->
    <rect x="370" y="310" width="60" height="80" rx="3" fill="#ffffff" opacity="0.85"/>
    <text x="400" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4477aa" text-anchor="middle">PURE</text>
    <text x="400" y="352" font-family="Arial, sans-serif" font-size="11" fill="#4477aa" text-anchor="middle">SPRING</text>
    <text x="400" y="368" font-family="Arial, sans-serif" font-size="8" fill="#666" text-anchor="middle">500 mL</text>
    
    <!-- Barcode on label -->
    <g opacity="0.6">
      <rect x="378" y="373" width="1.5" height="12" fill="#000"/>
      <rect x="381" y="373" width="1" height="12" fill="#000"/>
      <rect x="384" y="373" width="2" height="12" fill="#000"/>
      <rect x="388" y="373" width="1" height="12" fill="#000"/>
      <rect x="391" y="373" width="1.5" height="12" fill="#000"/>
      <rect x="394" y="373" width="1" height="12" fill="#000"/>
      <rect x="397" y="373" width="2" height="12" fill="#000"/>
      <rect x="401" y="373" width="1.5" height="12" fill="#000"/>
      <rect x="404" y="373" width="1" height="12" fill="#000"/>
      <rect x="407" y="373" width="1.5" height="12" fill="#000"/>
      <rect x="410" y="373" width="2" height="12" fill="#000"/>
      <rect x="414" y="373" width="1" height="12" fill="#000"/>
      <rect x="417" y="373" width="1.5" height="12" fill="#000"/>
      <rect x="420" y="373" width="1" height="12" fill="#000"/>
    </g>
    
    <!-- Fingerprints visible on bottle -->
    <g opacity="0.25">
      <ellipse cx="385" cy="240" rx="15" ry="20" fill="#333" transform="rotate(-15 385 240)"/>
      <ellipse cx="415" cy="260" rx="12" ry="18" fill="#333" transform="rotate(20 415 260)"/>
      <ellipse cx="390" cy="400" rx="14" ry="19" fill="#333" transform="rotate(-10 390 400)"/>
    </g>
    
    <!-- Residue at bottom (suspicious) -->
    <ellipse cx="400" cy="456" rx="25" ry="8" fill="#d4d4aa" opacity="0.5"/>
    <ellipse cx="398" cy="457" rx="18" ry="6" fill="#c4c49a" opacity="0.6"/>
  </g>
  
  <!-- Evidence markers -->
  <g>
    <!-- Residue marker -->
    <circle cx="400" cy="456" r="35" fill="none" stroke="#ffcc00" stroke-width="2.5" stroke-dasharray="5,3"/>
    <line x1="435" y1="450" x2="480" y2="430" stroke="#ffcc00" stroke-width="2"/>
    <text x="485" y="436" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffcc00">A</text>
    
    <!-- Fingerprint marker -->
    <circle cx="390" cy="400" r="25" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="365" y1="395" x2="320" y2="380" stroke="#ffcc00" stroke-width="1.5"/>
    <text x="290" y="386" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffcc00">B</text>
  </g>
  
  <!-- Evidence tag -->
  <g>
    <rect x="480" y="160" width="280" height="220" fill="#1a1a1a" stroke="#ffcc00" stroke-width="2" opacity="0.95"/>
    <text x="495" y="185" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#ffcc00">EVIDENCE #095</text>
    <line x1="495" y1="190" x2="745" y2="190" stroke="#333" stroke-width="1"/>
    
    <text x="495" y="210" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Item: Water Bottle</text>
    <text x="495" y="228" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Brand: Pure Spring (500mL)</text>
    <text x="495" y="246" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Location: Galley cabinet</text>
    
    <line x1="495" y1="255" x2="745" y2="255" stroke="#444" stroke-width="1"/>
    
    <text x="495" y="275" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker A:</text>
    <text x="495" y="290" font-family="Arial, sans-serif" font-size="10" fill="#ff9999">RESIDUE DETECTED</text>
    <text x="495" y="305" font-family="Arial, sans-serif" font-size="9" fill="#999">Yellow-white precipitate</text>
    <text x="495" y="318" font-family="Arial, sans-serif" font-size="9" fill="#999">Lab analysis pending</text>
    
    <text x="495" y="338" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker B:</text>
    <text x="495" y="353" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Multiple fingerprints</text>
    <text x="495" y="368" font-family="Arial, sans-serif" font-size="9" fill="#999">Partial prints recovered</text>
  </g>
  
  <!-- Lab result note -->
  <g>
    <rect x="80" y="280" width="240" height="110" fill="#1a1a1a" stroke="#ff6666" stroke-width="2" opacity="0.95"/>
    <text x="95" y="303" font-family="Arial, sans-serif" font-size="10" fill="#ff9999" font-weight="bold">🔬 LAB RESULT:</text>
    <text x="95" y="320" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Residue contains traces of:</text>
    <text x="95" y="337" font-family="Arial, sans-serif" font-size="9" fill="#ffcc00">• Hydroxypropyl</text>
    <text x="95" y="352" font-family="Arial, sans-serif" font-size="9" fill="#ffcc00">  methylcellulose (HPMC)</text>
    <text x="95" y="367" font-family="Arial, sans-serif" font-size="9" fill="#999">Capsule material consistent</text>
    <text x="95" y="382" font-family="Arial, sans-serif" font-size="9" fill="#999">with dissolved medication</text>
  </g>
  
  <!-- Scale reference -->
  <g>
    <rect x="650" y="520" width="100" height="15" fill="#333"/>
    <rect x="650" y="520" width="50" height="15" fill="#ffcc00"/>
    <text x="655" y="532" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold">0</text>
    <text x="695" y="532" font-family="Arial, sans-serif" font-size="10" fill="#ccc">5 cm</text>
  </g>
  
  <!-- Photo metadata -->
  <text x="80" y="580" font-family="Courier New, monospace" font-size="10" fill="#666">CSI-TV-2026-03-14_095_WATER_BOTTLE.JPG</text>
</svg>