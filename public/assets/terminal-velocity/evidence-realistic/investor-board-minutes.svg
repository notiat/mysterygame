<svg width="1024" height="768" viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="docShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="2" dy="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1024" height="768" fill="url(#bg)"/>
  
  <rect x="50" y="50" width="220" height="85" rx="4" fill="#0a0a0a" stroke="#ff6b35" stroke-width="3" opacity="0.95"/>
  <text x="160" y="80" fill="#ff6b35" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">CIRCUMSTANTIAL</text>
  <text x="160" y="115" fill="#ff6b35" font-family="'Courier New', monospace" font-size="26" font-weight="bold" text-anchor="middle">C-02</text>
  
  <g filter="url(#docShadow)">
    <rect x="180" y="150" width="660" height="550" rx="4" fill="#ffffff" stroke="#ccc" stroke-width="2"/>
    
    <rect x="180" y="150" width="660" height="50" fill="#e8e8e8"/>
    <text x="510" y="185" fill="#333" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">BOARD MINUTES - DRAFT</text>
    
    <text x="200" y="230" fill="#666" font-family="Arial" font-size="12">Date: November 5, 2025</text>
    <text x="200" y="250" fill="#666" font-family="Arial" font-size="12">Meeting: Emergency Board Session</text>
    <text x="200" y="270" fill="#d32f2f" font-family="Arial" font-size="12" font-weight="bold">Classification: DRAFT - DO NOT DISTRIBUTE</text>
    
    <rect x="200" y="285" width="620" height="1" fill="#ccc"/>
    
    <text x="200" y="310" fill="#333" font-family="Arial" font-size="13" font-weight="bold">ATTENDEES</text>
    <text x="200" y="330" fill="#333" font-family="Arial" font-size="11">Board members (6), Legal counsel (2), Strategic planning committee (3)</text>
    
    <rect x="200" y="345" width="620" height="1" fill="#ddd"/>
    
    <text x="200" y="370" fill="#333" font-family="Arial" font-size="13" font-weight="bold">AGENDA ITEM 3: POST-MERGER LEADERSHIP CONTINUITY</text>
    
    <text x="200" y="395" fill="#333" font-family="Arial" font-size="11">Discussion focused on CEO succession timing relative to Tokyo deal closure.</text>
    <text x="200" y="413" fill="#333" font-family="Arial" font-size="11">Legal presented analysis of pension trigger scenarios.</text>
    
    <rect x="200" y="430" width="620" height="100" fill="#fffef8" stroke="#f9a825" stroke-width="2"/>
    <text x="210" y="450" fill="#d32f2f" font-family="Arial" font-size="12" font-weight="bold">KEY RESOLUTION (Redacted in final minutes):</text>
    <text x="210" y="470" fill="#333" font-family="Arial" font-size="11">"Board acknowledges that abrupt leadership removal prior to deal</text>
    <text x="210" y="488" fill="#333" font-family="Arial" font-size="11">close would avoid pension liability trigger. <tspan font-weight="bold" fill="#d32f2f">Emergency continuity</tspan></text>
    <text x="210" y="506" fill="#333" font-family="Arial" font-size="11"><tspan font-weight="bold" fill="#d32f2f">plan</tspan> drafted for board approval. Implementation timeline: 1-2 weeks."</text>
    
    <text x="200" y="555" fill="#333" font-family="Arial" font-size="11">Motion carried: 5 in favor, 1 abstention</text>
    
    <rect x="200" y="570" width="620" height="1" fill="#ddd"/>
    
    <text x="200" y="595" fill="#333" font-family="Arial" font-size="13" font-weight="bold">AGENDA ITEM 4: EXTERNAL CONSULTATION</text>
    <text x="200" y="615" fill="#333" font-family="Arial" font-size="11">Board authorized engagement of specialized external contractor for</text>
    <text x="200" y="633" fill="#333" font-family="Arial" font-size="11">"operational transition services." Budget approved: $2.5M.</text>
    
    <text x="200" y="665" fill="#999" font-family="Arial" font-size="10" font-style="italic">Note: Final published minutes omitted Item 3 resolution language at</text>
    <text x="200" y="682" fill="#999" font-family="Arial" font-size="10" font-style="italic">counsel's recommendation. This draft preserved for internal record only.</text>
  </g>
  
  <!-- "DRAFT" watermark -->
  <g opacity="0.15" transform="rotate(-25 512 400)">
    <text x="512" y="420" fill="#ff0000" font-family="Arial" font-size="120" font-weight="bold" text-anchor="middle">DRAFT</text>
  </g>
  
  <rect x="50" y="620" width="600" height="100" rx="6" fill="#0a0a0a" stroke="#ff6b35" stroke-width="2" opacity="0.95"/>
  <text x="350" y="650" fill="#ff6b35" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">ASSESSMENT</text>
  <text x="70" y="675" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Circumstantial: Board anticipated "abrupt removal" scenario</text>
  <text x="70" y="695" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">$2.5M "external contractor" budget approved 7 days before incident</text>
  <text x="70" y="715" fill="#ff6b6b" font-family="'Courier New', monospace" font-size="11">Not definitive alone - requires corroboration with payment evidence</text>
  
</svg>
