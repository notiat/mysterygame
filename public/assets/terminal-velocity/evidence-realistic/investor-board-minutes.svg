<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="paper" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="#f8f8f0"/>
      <circle cx="20" cy="30" r="0.3" fill="#e8e8e0" opacity="0.5"/>
      <circle cx="60" cy="70" r="0.4" fill="#e8e8e0" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Evidence table -->
  <rect x="0" y="0" width="800" height="600" fill="#1a1a1a" opacity="0.4"/>
  
  <!-- Document stack (multiple pages visible) -->
  <g filter="url(#shadow)">
    <!-- Back pages (depth effect) -->
    <rect x="138" y="73" width="500" height="450" fill="#e0e0d8" stroke="#999" stroke-width="1" opacity="0.6"/>
    <rect x="136" y="71" width="500" height="450" fill="#e8e8e0" stroke="#999" stroke-width="1" opacity="0.7"/>
    <rect x="134" y="69" width="500" height="450" fill="#f0f0e8" stroke="#999" stroke-width="1" opacity="0.8"/>
    
    <!-- Main document (top page) -->
    <rect x="130" y="65" width="500" height="450" fill="url(#paper)" stroke="#999" stroke-width="1"/>
    
    <!-- Letterhead -->
    <rect x="130" y="65" width="500" height="55" fill="#1a2844" opacity="0.95"/>
    <text x="380" y="95" font-family="Times New Roman, serif" font-size="22" font-weight="bold" fill="#d4af37" text-anchor="middle">VELOCITAS AVIATION INC.</text>
    <text x="380" y="112" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" text-anchor="middle">BOARD OF DIRECTORS MEETING MINUTES - CONFIDENTIAL</text>
    
    <!-- Document title -->
    <text x="160" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Board Meeting Minutes</text>
    <line x1="160" y1="155" x2="600" y2="155" stroke="#ccc" stroke-width="1"/>
    
    <!-- Meeting details -->
    <text x="160" y="178" font-family="Courier New, monospace" font-size="10" fill="#333">DATE: February 28, 2026</text>
    <text x="160" y="194" font-family="Courier New, monospace" font-size="10" fill="#333">TIME: 14:00-17:30 PST</text>
    <text x="160" y="210" font-family="Courier New, monospace" font-size="10" fill="#333">LOCATION: Velocitas HQ, Conference Room A</text>
    
    <line x1="160" y1="220" x2="600" y2="220" stroke="#ddd" stroke-width="1"/>
    
    <!-- Attendees section -->
    <text x="160" y="242" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">ATTENDEES:</text>
    <text x="175" y="260" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">• Victoria Blake (CEO, Chair)</text>
    <text x="175" y="276" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">• Dr. Elias Chen (CTO)</text>
    <text x="175" y="292" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">• Margaret Stevens (CFO)</text>
    <text x="175" y="308" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">• James Corrigan (Board Member, Venture Capital)</text>
    <text x="175" y="324" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">• Sarah Kim (Board Member, External Advisor)</text>
    
    <line x1="160" y1="335" x2="600" y2="335" stroke="#ddd" stroke-width="1"/>
    
    <!-- Agenda items -->
    <text x="160" y="355" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">KEY DISCUSSIONS:</text>
    
    <text x="175" y="375" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">1. Q1 Financial Review (approved)</text>
    <text x="175" y="393" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">2. Prototype testing schedule (delayed 2 weeks)</text>
    
    <!-- Critical item (highlighted) -->
    <rect x="165" y="405" width="430" height="75" fill="#fff4e6" stroke="#ff8800" stroke-width="2"/>
    <text x="180" y="425" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a" font-weight="bold">3. Yamamoto Industries Partnership Proposal</text>
    
    <text x="190" y="445" font-family="Arial, sans-serif" font-size="9" fill="#2a2a2a">Dr. Chen presented terms: $50M investment for 35% equity.</text>
    <text x="190" y="460" font-family="Arial, sans-serif" font-size="9" fill="#cc0000" font-weight="bold">CEO Blake expressed strong reservations. Vote delayed.</text>
    <text x="190" y="475" font-family="Arial, sans-serif" font-size="9" fill="#2a2a2a">Corrigan pushed for acceptance; Blake insisted on review.</text>
    
    <!-- Motion/outcome -->
    <rect x="165" y="490" width="430" height="35" fill="#ffe6e6" stroke="#cc0000" stroke-width="1"/>
    <text x="180" y="509" font-family="Arial, sans-serif" font-size="9" fill="#cc0000" font-weight="bold">MOTION: Defer decision to special session (March 18).</text>
    <text x="180" y="522" font-family="Arial, sans-serif" font-size="9" fill="#333">RESULT: Approved 3-2 (Blake, Kim, Stevens FOR; Chen, Corrigan AGAINST)</text>
  </g>
  
  <!-- Handwritten note in margin (red pen) -->
  <g>
    <path d="M 600 410 Q 610 405 625 410 Q 640 415 650 420" 
          fill="none" stroke="#cc0000" stroke-width="2" opacity="0.8"/>
    <text x="610" y="440" font-family="Brush Script MT, cursive" font-size="14" fill="#cc0000" transform="rotate(-5 610 440)">They're pushing</text>
    <text x="610" y="458" font-family="Brush Script MT, cursive" font-size="14" fill="#cc0000" transform="rotate(-5 610 458)">too hard...</text>
  </g>
  
  <!-- Evidence markers -->
  <g>
    <!-- Yamamoto discussion marker -->
    <rect x="170" y="410" width="420" height="70" fill="none" stroke="#ffcc00" stroke-width="2.5" stroke-dasharray="5,3"/>
    <line x1="680" y1="445" x2="720" y2="420" stroke="#ffcc00" stroke-width="2"/>
    <text x="725" y="426" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffcc00">A</text>
    
    <!-- Vote result marker -->
    <rect x="170" y="505" width="420" height="25" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="100" y1="517" x2="170" y2="517" stroke="#ffcc00" stroke-width="1.5"/>
    <text x="65" y="523" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffcc00">B</text>
  </g>
  
  <!-- Evidence tag -->
  <g>
    <rect x="50" y="180" width="300" height="230" fill="#1a1a1a" stroke="#ffcc00" stroke-width="2" opacity="0.95"/>
    <text x="65" y="205" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#ffcc00">EVIDENCE #088</text>
    <line x1="65" y1="210" x2="335" y2="210" stroke="#333" stroke-width="1"/>
    
    <text x="65" y="230" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Item: Board Minutes</text>
    <text x="65" y="248" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Date: Feb 28, 2026</text>
    <text x="65" y="266" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Source: Victoria's files</text>
    
    <line x1="65" y1="275" x2="335" y2="275" stroke="#444" stroke-width="1"/>
    
    <text x="65" y="295" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker A:</text>
    <text x="65" y="310" font-family="Arial, sans-serif" font-size="10" fill="#ff9999">CONFLICT DOCUMENTED</text>
    <text x="65" y="325" font-family="Arial, sans-serif" font-size="9" fill="#999">Victoria vs. Dr. Chen</text>
    <text x="65" y="338" font-family="Arial, sans-serif" font-size="9" fill="#999">Tokyo deal disagreement</text>
    
    <text x="65" y="358" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker B:</text>
    <text x="65" y="373" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Vote: 3-2 split</text>
    <text x="65" y="388" font-family="Arial, sans-serif" font-size="9" fill="#999">Victoria delayed decision</text>
    <text x="65" y="401" font-family="Arial, sans-serif" font-size="9" fill="#999">until March 18 (after death)</text>
  </g>
  
  <!-- Motive context -->
  <g>
    <rect x="50" y="430" width="300" height="85" fill="#1a1a1a" stroke="#ff6666" stroke-width="2" opacity="0.95"/>
    <text x="65" y="453" font-family="Arial, sans-serif" font-size="10" fill="#ff9999" font-weight="bold">⚠ MOTIVE CONTEXT:</text>
    <text x="65" y="470" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Dr. Chen and investor Corrigan</text>
    <text x="65" y="485" font-family="Arial, sans-serif" font-size="9" fill="#ccc">both opposed delay. Victoria's</text>
    <text x="65" y="500" font-family="Arial, sans-serif" font-size="9" fill="#ccc">death on March 14 = deal</text>
    <text x="65" y="515" font-family="Arial, sans-serif" font-size="9" fill="#ff9999">could proceed without her veto</text>
  </g>
  
  <!-- Scale reference -->
  <g>
    <rect x="650" y="540" width="100" height="15" fill="#333"/>
    <rect x="650" y="540" width="50" height="15" fill="#ffcc00"/>
    <text x="655" y="552" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold">0</text>
    <text x="695" y="552" font-family="Arial, sans-serif" font-size="10" fill="#ccc">5 cm</text>
  </g>
  
  <!-- Photo metadata -->
  <text x="350" y="585" font-family="Courier New, monospace" font-size="10" fill="#666">CSI-TV-2026-03-14_088_BOARD_MINUTES.JPG</text>
</svg>