<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="paper" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="#f8f8f0"/>
      <circle cx="20" cy="30" r="0.3" fill="#e8e8e0" opacity="0.5"/>
      <circle cx="60" cy="70" r="0.4" fill="#e8e8e0" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Evidence table -->
  <rect x="0" y="0" width="800" height="600" fill="#1a1a1a" opacity="0.4"/>
  
  <!-- Document paper -->
  <g filter="url(#shadow)">
    <rect x="120" y="60" width="560" height="480" fill="url(#paper)" stroke="#999" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="120" y="60" width="560" height="50" fill="#1a1a1a" opacity="0.9"/>
    <text x="400" y="90" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#ffcc00" text-anchor="middle">CALL TRANSCRIPT - CONFIDENTIAL</text>
    
    <!-- Call metadata -->
    <rect x="140" y="125" width="520" height="85" fill="#f0f0f0" stroke="#999" stroke-width="1"/>
    <text x="155" y="145" font-family="Courier New, monospace" font-size="11" fill="#1a1a1a" font-weight="bold">CALL RECORD #TV337-0214</text>
    <text x="155" y="163" font-family="Courier New, monospace" font-size="10" fill="#333">Date: March 14, 2026</text>
    <text x="155" y="179" font-family="Courier New, monospace" font-size="10" fill="#333">Time: 14:32 PST (in-flight)</text>
    <text x="155" y="195" font-family="Courier New, monospace" font-size="10" fill="#333">From: Cockpit (Capt. Rodriguez)</text>
    <text x="155" y="211" font-family="Courier New, monospace" font-size="10" fill="#333">To: Ground Control (LAX Tower)</text>
    
    <!-- Transcript section -->
    <line x1="140" y1="225" x2="660" y2="225" stroke="#999" stroke-width="2"/>
    
    <!-- Transcript content -->
    <text x="155" y="250" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a" font-weight="bold">RODRIGUEZ:</text>
    <text x="250" y="250" font-family="Courier New, monospace" font-size="10" fill="#2a2a2a">LAX Tower, this is Velocitas</text>
    <text x="250" y="266" font-family="Courier New, monospace" font-size="10" fill="#2a2a2a">Three-Three-Seven. We have a</text>
    <text x="250" y="282" font-family="Courier New, monospace" font-size="10" fill="#2a2a2a">medical emergency on board.</text>
    
    <text x="155" y="306" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a" font-weight="bold">LAX TOWER:</text>
    <text x="250" y="306" font-family="Courier New, monospace" font-size="10" fill="#2a2a2a">Copy, TV-337. Nature of</text>
    <text x="250" y="322" font-family="Courier New, monospace" font-size="10" fill="#2a2a2a">emergency?</text>
    
    <text x="155" y="346" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a" font-weight="bold">RODRIGUEZ:</text>
    <text x="250" y="346" font-family="Courier New, monospace" font-size="10" fill="#cc0000">Passenger in cardiac distress.</text>
    <text x="250" y="362" font-family="Courier New, monospace" font-size="10" fill="#cc0000">Possible anaphylactic shock.</text>
    <text x="250" y="378" font-family="Courier New, monospace" font-size="10" fill="#cc0000">Requesting priority landing.</text>
    
    <text x="155" y="402" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a" font-weight="bold">LAX TOWER:</text>
    <text x="250" y="402" font-family="Courier New, monospace" font-size="10" fill="#2a2a2a">Cleared for priority approach.</text>
    <text x="250" y="418" font-family="Courier New, monospace" font-size="10" fill="#2a2a2a">Medical standing by. Runway</text>
    <text x="250" y="434" font-family="Courier New, monospace" font-size="10" fill="#2a2a2a">Two-Five-Left cleared.</text>
    
    <text x="155" y="458" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a" font-weight="bold">RODRIGUEZ:</text>
    <text x="250" y="458" font-family="Courier New, monospace" font-size="10" fill="#2a2a2a">Copy. Descending now.</text>
    
    <!-- Critical timestamp -->
    <rect x="140" y="475" width="520" height="50" fill="#ffebcd" stroke="#ff8800" stroke-width="2"/>
    <text x="155" y="495" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a" font-weight="bold">TIMESTAMP:</text>
    <text x="250" y="495" font-family="Courier New, monospace" font-size="10" fill="#cc0000" font-weight="bold">14:37 PST - Patient unresponsive</text>
    <text x="155" y="515" font-family="Courier New, monospace" font-size="9" fill="#555">[Flight attendant reported Victoria Blake had stopped breathing]</text>
  </g>
  
  <!-- Evidence markers -->
  <g>
    <!-- Medical emergency marker -->
    <rect x="245" y="340" width="390" height="48" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="680" y1="364" x2="720" y2="340" stroke="#ffcc00" stroke-width="2"/>
    <text x="725" y="346" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffcc00">A</text>
    
    <!-- Timestamp marker -->
    <rect x="145" y="490" width="500" height="20" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="100" y1="500" x2="145" y2="500" stroke="#ffcc00" stroke-width="2"/>
    <text x="65" y="506" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffcc00">B</text>
  </g>
  
  <!-- Evidence tag -->
  <g>
    <rect x="50" y="140" width="280" height="190" fill="#1a1a1a" stroke="#ffcc00" stroke-width="2" opacity="0.95"/>
    <text x="65" y="165" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#ffcc00">EVIDENCE #047</text>
    <line x1="65" y1="170" x2="315" y2="170" stroke="#333" stroke-width="1"/>
    
    <text x="65" y="190" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Item: Radio Transcript</text>
    <text x="65" y="208" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Flight TV-337 Emergency</text>
    <text x="65" y="226" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Time: 14:32-14:37 PST</text>
    
    <line x1="65" y1="235" x2="315" y2="235" stroke="#444" stroke-width="1"/>
    
    <text x="65" y="255" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker A:</text>
    <text x="65" y="270" font-family="Arial, sans-serif" font-size="10" fill="#ff9999">Medical emergency</text>
    <text x="65" y="285" font-family="Arial, sans-serif" font-size="9" fill="#999">Anaphylactic shock</text>
    
    <text x="65" y="305" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker B:</text>
    <text x="65" y="320" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Victim unresponsive</text>
  </g>
  
  <!-- Timeline note -->
  <g>
    <rect x="50" y="350" width="280" height="80" fill="#1a1a1a" stroke="#ff6666" stroke-width="2" opacity="0.9"/>
    <text x="65" y="373" font-family="Arial, sans-serif" font-size="10" fill="#ff9999" font-weight="bold">⏱ TIMELINE:</text>
    <text x="65" y="390" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Emergency declared 14:32</text>
    <text x="65" y="405" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Unresponsive by 14:37</text>
    <text x="65" y="420" font-family="Arial, sans-serif" font-size="9" fill="#ff9999">~5 min reaction time</text>
  </g>
  
  <!-- Photo metadata -->
  <text x="120" y="580" font-family="Courier New, monospace" font-size="10" fill="#666">CSI-TV-2026-03-14_047_RADIO_TRANSCRIPT.JPG</text>
</svg>