    <text x="645" y="342" fill="#333" font-family="Arial" font-size="10" text-anchor="middle">Julian R. + Chloe E.</text>
    
    <rect x="280" y="350" width="120" height="25" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
    <rect x="400" y="350" width="150" height="25" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
    <rect x="550" y="350" width="190" height="25" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
