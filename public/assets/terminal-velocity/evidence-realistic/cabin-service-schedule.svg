    <text x="290" y="495" fill="#666" font-family="'Segoe Script', cursive" font-size="10">video call. Chloe served @ bar area. ~3 min later</text>
    <text x="290" y="510" fill="#666" font-family="'Segoe Script', cursive" font-size="10">passenger showed distress symptoms.</text>
    
    <text x="510" y="650" fill="#666" font-family="'Segoe Script', cursive" font-size="11" text-anchor="middle">Crew Lead: Julian Ricci</text>
