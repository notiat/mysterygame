  <circle cx="470" cy="387" r="60" fill="none" stroke="#ff00ff" stroke-width="4" stroke-dasharray="10,5"/>
  
  <rect x="50" y="630" width="550" height="90" rx="6" fill="#0a0a0a" stroke="#4a90e2" stroke-width="2" opacity="0.95"/>
  <text x="325" y="660" fill="#4a90e2" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">TIMELINE CORRELATION</text>
  <text x="70" y="685" fill="#ff6b6b" font-family="'Courier New', monospace" font-size="11" font-weight="bold">18:43 UTC: Whiskey service logged (aligns with all other evidence)</text>
  <text x="70" y="705" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Corroborates: Network logs, co-pilot statement, camera footage</text>
  
</svg>
