    <text x="645" y="317" fill="#333" font-family="Arial" font-size="10" text-anchor="middle">Julian R.</text>
    
    <rect x="280" y="325" width="120" height="25" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
