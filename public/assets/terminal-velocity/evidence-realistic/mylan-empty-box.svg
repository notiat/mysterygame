<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cardboard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c19a6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8936b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Evidence table surface -->
  <rect x="0" y="400" width="800" height="200" fill="#1a1a1a" opacity="0.5"/>
  
  <!-- Pharmaceutical box - EpiPen packaging -->
  <g filter="url(#shadow)">
    <!-- Box main body -->
    <rect x="200" y="150" width="400" height="280" rx="5" fill="url(#cardboard)" stroke="#8b7355" stroke-width="2"/>
    
    <!-- Box flaps/opening (opened state) -->
    <path d="M 200 150 L 180 130 L 180 180 L 200 180 Z" fill="#b8936b" opacity="0.7"/>
    <path d="M 600 150 L 620 130 L 620 180 L 600 180 Z" fill="#b8936b" opacity="0.7"/>
    
    <!-- Brand label area (yellow/orange medical warning colors) -->
    <rect x="220" y="180" width="360" height="100" rx="3" fill="#ffa500" opacity="0.9"/>
    <rect x="225" y="185" width="350" height="90" rx="2" fill="#ffb732" opacity="0.7"/>
    
    <!-- Brand name -->
    <text x="400" y="220" font-family="Arial Black, sans-serif" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="middle">MYLAN</text>
    <text x="400" y="252" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">EPINEPHRINE</text>
    <text x="400" y="270" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">Auto-Injector 0.3mg</text>
    
    <!-- Product details section -->
    <rect x="220" y="300" width="360" height="110" fill="#e8d4b8" opacity="0.8"/>
    
    <text x="235" y="322" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">PRESCRIPTION MEDICINE</text>
    <text x="235" y="343" font-family="Arial, sans-serif" font-size="10" fill="#333">For emergency allergic reactions</text>
    <text x="235" y="360" font-family="Arial, sans-serif" font-size="10" fill="#333">(anaphylaxis)</text>
    
    <text x="235" y="385" font-family="Courier New, monospace" font-size="9" fill="#555">LOT: EP2026-0147</text>
    <text x="235" y="400" font-family="Courier New, monospace" font-size="9" fill="#555">EXP: 08/2026</text>
    
    <!-- Warning symbols -->
    <circle cx="550" cy="340" r="25" fill="#ff0000" opacity="0.8"/>
    <text x="550" y="350" font-family="Arial Black, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">!</text>
    
    <!-- Barcode -->
    <g>
      <rect x="240" y="420" width="4" height="30" fill="#1a1a1a"/>
      <rect x="246" y="420" width="2" height="30" fill="#1a1a1a"/>
      <rect x="250" y="420" width="3" height="30" fill="#1a1a1a"/>
      <rect x="255" y="420" width="2" height="30" fill="#1a1a1a"/>
      <rect x="259" y="420" width="4" height="30" fill="#1a1a1a"/>
      <rect x="265" y="420" width="2" height="30" fill="#1a1a1a"/>
      <rect x="269" y="420" width="3" height="30" fill="#1a1a1a"/>
      <rect x="274" y="420" width="4" height="30" fill="#1a1a1a"/>
      <rect x="280" y="420" width="2" height="30" fill="#1a1a1a"/>
      <rect x="284" y="420" width="3" height="30" fill="#1a1a1a"/>
    </g>
    
    <!-- EMPTY label (red tape) -->
    <rect x="320" y="360" width="160" height="35" fill="#cc0000" opacity="0.9" transform="rotate(-8 400 377)"/>
    <text x="400" y="384" font-family="Impact, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle" transform="rotate(-8 400 384)">EMPTY</text>
    
    <!-- Wear and tear -->
    <line x1="590" y1="200" x2="595" y2="250" stroke="#8b7355" stroke-width="1" opacity="0.5"/>
    <line x1="210" y1="380" x2="215" y2="420" stroke="#8b7355" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Evidence markers -->
  <g>
    <!-- Empty marker -->
    <circle cx="485" cy="377" r="40" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="535" y="385" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffcc00">A</text>
    
    <!-- Lot number marker -->
    <rect x="220" y="375" width="145" height="35" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="180" y1="392" x2="220" y2="392" stroke="#ffcc00" stroke-width="1.5"/>
    <text x="155" y="397" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffcc00">B</text>
  </g>
  
  <!-- Evidence tag -->
  <g>
    <rect x="80" y="50" width="280" height="180" fill="#1a1a1a" stroke="#ffcc00" stroke-width="2" opacity="0.95"/>
    <text x="95" y="75" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#ffcc00">EVIDENCE #054</text>
    <line x1="95" y1="80" x2="345" y2="80" stroke="#333" stroke-width="1"/>
    
    <text x="95" y="100" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Item: EpiPen Box (Empty)</text>
    <text x="95" y="118" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Brand: Mylan 0.3mg</text>
    <text x="95" y="136" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Location: V. Blake's cabin</text>
    
    <line x1="95" y1="145" x2="345" y2="145" stroke="#444" stroke-width="1"/>
    
    <text x="95" y="163" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker A:</text>
    <text x="95" y="178" font-family="Arial, sans-serif" font-size="10" fill="#ff9999">Box is EMPTY</text>
    <text x="95" y="191" font-family="Arial, sans-serif" font-size="9" fill="#999">Contents used or removed</text>
    
    <text x="95" y="209" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker B:</text>
    <text x="95" y="224" font-family="Arial, sans-serif" font-size="10" fill="#aaa">LOT: EP2026-0147</text>
  </g>
  
  <!-- Additional context note -->
  <g>
    <rect x="420" y="480" width="290" height="70" fill="#1a1a1a" stroke="#ff6666" stroke-width="2" opacity="0.9"/>
    <text x="435" y="503" font-family="Arial, sans-serif" font-size="10" fill="#ff9999" font-weight="bold">⚠ CRITICAL:</text>
    <text x="435" y="520" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Victim had severe allergy</text>
    <text x="435" y="535" font-family="Arial, sans-serif" font-size="9" fill="#ccc">EpiPen was missing at time</text>
    <text x="435" y="550" font-family="Arial, sans-serif" font-size="9" fill="#ccc">of anaphylactic event</text>
  </g>
  
  <!-- Scale reference -->
  <g>
    <rect x="650" y="530" width="100" height="15" fill="#333"/>
    <rect x="650" y="530" width="50" height="15" fill="#ffcc00"/>
    <text x="655" y="542" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold">0</text>
    <text x="695" y="542" font-family="Arial, sans-serif" font-size="10" fill="#ccc">5 cm</text>
  </g>
  
  <!-- Photo metadata -->
  <text x="80" y="580" font-family="Courier New, monospace" font-size="10" fill="#666">CSI-TV-2026-03-14_054_MYLAN_EPIPEN_BOX.JPG</text>
</svg>