<svg width="1024" height="768" viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tableBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="boxShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1024" height="768" fill="url(#tableBg)"/>
  
  <rect x="50" y="50" width="220" height="85" rx="4" fill="#0a0a0a" stroke="#ffd700" stroke-width="3" opacity="0.95"/>
  <text x="160" y="80" fill="#ffd700" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">EVIDENCE</text>
  <text x="160" y="115" fill="#ffd700" font-family="'Courier New', monospace" font-size="26" font-weight="bold" text-anchor="middle">F-12</text>
  
  <g filter="url(#boxShadow)">
    <!-- Flattened box (yellow/blue Mylan colors) -->
    <polygon points="300,250 700,230 720,500 280,520" fill="#ffd700" opacity="0.9"/>
    <rect x="280" y="230" width="440" height="290" fill="#ffd700" stroke="#f9a825" stroke-width="3" opacity="0.95"/>
    
    <!-- Blue stripe (Mylan brand color) -->
    <rect x="280" y="280" width="440" height="80" fill="#1e88e5"/>
    
    <!-- Mylan logo area -->
    <text x="500" y="330" fill="#ffffff" font-family="Arial" font-size="48" font-weight="bold" text-anchor="middle">MYLAN</text>
    
    <!-- Product name -->
    <text x="500" y="400" fill="#333" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">EpiPen® Auto-Injector</text>
    <text x="500" y="425" fill="#333" font-family="Arial" font-size="16" text-anchor="middle">Epinephrine Injection, USP</text>
    <text x="500" y="450" fill="#333" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">0.3 mg</text>
    
    <!-- Lot number area (scraped but visible under UV) -->
    <rect x="320" y="470" width="180" height="35" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
    <text x="330" y="490" fill="#999" font-family="'Courier New', monospace" font-size="11">LOT: </text>
    
    <!-- Scratched area -->
    <g opacity="0.6">
      <line x1="370" y1="475" x2="490" y2="495" stroke="#666" stroke-width="3"/>
      <line x1="375" y1="480" x2="485" y2="490" stroke="#666" stroke-width="2"/>
      <line x1="380" y1="485" x2="480" y2="485" stroke="#666" stroke-width="2"/>
    </g>
    
    <!-- UV light revelation -->
    <text x="410" y="492" fill="#9c27b0" font-family="'Courier New', monospace" font-size="11" opacity="0.7">B4782-A</text>
    
    <!-- Expiry date -->
    <rect x="520" y="470" width="180" height="35" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
    <text x="530" y="492" fill="#333" font-family="'Courier New', monospace" font-size="11">EXP: 08/2026</text>
  </g>
  
  <!-- UV light indicator -->
  <g transform="translate(650, 350)">
    <circle cx="0" cy="0" r="40" fill="#9c27b0" opacity="0.3"/>
    <text x="0" y="8" fill="#9c27b0" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">UV</text>
  </g>
  
  <!-- Evidence marker pointing to lot number -->
  <circle cx="450" cy="485" r="70" fill="none" stroke="#ff00ff" stroke-width="4" stroke-dasharray="10,5"/>
  
  <rect x="50" y="580" width="550" height="140" rx="6" fill="#0a0a0a" stroke="#ffd700" stroke-width="2" opacity="0.95"/>
  <text x="325" y="610" fill="#ffd700" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">FORENSIC ANALYSIS</text>
  <text x="70" y="635" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Item: Empty Mylan EpiPen box (flattened)</text>
  <text x="70" y="655" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Lot number: B4782-A (scraped but visible under UV light)</text>
  <text x="70" y="675" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Matches: Victim's prescription records (same lot family)</text>
  <text x="70" y="695" fill="#ff6b6b" font-family="'Courier New', monospace" font-size="11" font-weight="bold">Significance: Evidence of intentional EpiPen swap</text>
  <text x="70" y="715" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="11">Location: Found in Chloe's carry-on toiletry compartment</text>
  
</svg>
