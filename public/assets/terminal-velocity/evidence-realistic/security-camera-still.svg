<svg width="1024" height="768" viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="monitorBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <filter id="cameraGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" />
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0.05" />
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="scanlines">
      <feImage href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3Cpattern id='p' width='1' height='2' patternUnits='userSpaceOnUse'%3E%3Crect width='1' height='1' fill='%23000'/%3E%3C/pattern%3E%3Crect width='100%25' height='100%25' fill='url(%23p)'/%3E%3C/svg%3E"/>
      <feBlend mode="multiply"/>
    </filter>
  </defs>
  
  <rect width="1024" height="768" fill="url(#monitorBg)"/>
  
  <!-- Evidence tag -->
  <rect x="50" y="50" width="220" height="85" rx="4" fill="#0a0a0a" stroke="#00ff00" stroke-width="3" opacity="0.95"/>
  <text x="160" y="80" fill="#00ff00" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">SURVEILLANCE</text>
  <text x="160" y="115" fill="#00ff00" font-family="'Courier New', monospace" font-size="26" font-weight="bold" text-anchor="middle">V-01</text>
  
  <!-- Security camera feed frame -->
  <rect x="120" y="160" width="784" height="520" rx="4" fill="#0a0a0a" stroke="#00ff00" stroke-width="3"/>
  
  <!-- Camera feed content (grainy, low-angle cabin shot) -->
  <g filter="url(#cameraGrain)">
    <!-- Cabin interior (dark, grainy) -->
    <rect x="130" y="170" width="764" height="500" fill="#1a1f2e"/>
    
    <!-- Bar/galley area (blurry background) -->
    <rect x="200" y="250" width="400" height="300" fill="#2a3442" opacity="0.6"/>
    <ellipse cx="400" cy="350" rx="150" ry="100" fill="#3a4552" opacity="0.4"/>
    
    <!-- Silhouette of person at bar (Chloe) -->
    <ellipse cx="420" cy="380" rx="80" ry="120" fill="#4a5568" opacity="0.8"/>
    <circle cx="420" cy="320" r="40" fill="#5a6678" opacity="0.8"/>
    
    <!-- Bar counter -->
    <rect x="300" y="450" width="300" height="80" fill="#2a2a2a" opacity="0.7"/>
    
    <!-- Glass on bar (barely visible) -->
    <rect x="450" y="430" width="30" height="50" fill="#6a7a8a" opacity="0.6"/>
    
    <!-- Laptop screen glow (video call visible) -->
    <rect x="600" y="300" width="180" height="120" fill="#1e3a5f" opacity="0.8"/>
    <rect x="615" y="315" width="150" height="90" fill="#2a5a8f" opacity="0.6"/>
    
    <!-- Red circle highlighting the critical area -->
    <circle cx="450" cy="440" r="80" fill="none" stroke="#ff0000" stroke-width="4" stroke-dasharray="10,5"/>
    
    <!-- Timestamp overlay -->
    <rect x="140" y="180" width="250" height="35" fill="#000000" opacity="0.8"/>
    <text x="150" y="205" fill="#ff0000" font-family="'Courier New', monospace" font-size="18" font-weight="bold">2025-11-12  18:42:10 UTC</text>
    
    <!-- Camera ID -->
    <text x="870" y="205" fill="#00ff00" font-family="'Courier New', monospace" font-size="14" text-anchor="end">CAM-03 [CABIN]</text>
    
    <!-- Recording indicator -->
    <circle cx="860" cy="640" r="8" fill="#ff0000"/>
    <text x="875" y="645" fill="#ff0000" font-family="'Courier New', monospace" font-size="12">REC</text>
  </g>
  
  <!-- Scanline effect overlay -->
  <g opacity="0.15" filter="url(#scanlines)">
    <line x1="130" y1="180" x2="894" y2="180" stroke="#00ff00" stroke-width="1"/>
    <line x1="130" y1="200" x2="894" y2="200" stroke="#00ff00" stroke-width="1"/>
    <line x1="130" y1="220" x2="894" y2="220" stroke="#00ff00" stroke-width="1"/>
    <line x1="130" y1="240" x2="894" y2="240" stroke="#00ff00" stroke-width="1"/>
  </g>
  
  <!-- Forensic annotations -->
  <rect x="50" y="690" width="500" height="60" rx="4" fill="#0a0a0a" stroke="#00ff00" stroke-width="2" opacity="0.95"/>
  <text x="300" y="715" fill="#00ff00" font-family="'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">FRAME ANALYSIS</text>
  <text x="60" y="735" fill="#e8e8e8" font-family="'Courier New', monospace" font-size="10">Subject near bar during call freeze | Hands obscured | Glass visible on counter</text>
  
  <!-- Analysis box (right side) -->
  <rect x="570" y="690" width="430" height="60" rx="4" fill="#1a1a2a" stroke="#ff00ff" stroke-width="2" opacity="0.95"/>
  <text x="785" y="715" fill="#ff00ff" font-family="'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">KEY OBSERVATION</text>
  <text x="580" y="735" fill="#ff6b6b" font-family="'Courier New', monospace" font-size="10">Opportunity window confirmed - Subject at bar 18:42 UTC</text>
  
</svg>
