<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="paper" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="#f8f8f0"/>
      <circle cx="20" cy="30" r="0.3" fill="#e8e8e0" opacity="0.5"/>
      <circle cx="60" cy="70" r="0.4" fill="#e8e8e0" opacity="0.5"/>
      <circle cx="85" cy="45" r="0.3" fill="#e8e8e0" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Evidence table -->
  <rect x="0" y="0" width="800" height="600" fill="#1a1a1a" opacity="0.4"/>
  
  <!-- Document paper -->
  <g filter="url(#shadow)">
    <rect x="150" y="80" width="500" height="450" fill="url(#paper)" stroke="#999" stroke-width="1"/>
    
    <!-- Letterhead -->
    <rect x="150" y="80" width="500" height="60" fill="#1a2844" opacity="0.95"/>
    <text x="400" y="110" font-family="Times New Roman, serif" font-size="24" font-weight="bold" fill="#d4af37" text-anchor="middle">VELOCITAS AVIATION</text>
    <text x="400" y="130" font-family="Arial, sans-serif" font-size="10" fill="#c0c0c0" text-anchor="middle">CONFIDENTIAL MEMORANDUM</text>
    
    <!-- Document title -->
    <text x="180" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">RE: Tokyo Partnership Agreement</text>
    <line x1="180" y1="175" x2="620" y2="175" stroke="#ccc" stroke-width="1"/>
    
    <!-- Document details -->
    <text x="180" y="200" font-family="Courier New, monospace" font-size="10" fill="#333">DATE: March 12, 2026</text>
    <text x="180" y="218" font-family="Courier New, monospace" font-size="10" fill="#333">FROM: Dr. Elias Chen, CTO</text>
    <text x="180" y="236" font-family="Courier New, monospace" font-size="10" fill="#333">TO: Victoria Blake, CEO</text>
    <text x="180" y="254" font-family="Courier New, monospace" font-size="10" fill="#333">SUBJECT: Yamamoto Industries - Final Terms</text>
    
    <line x1="180" y1="265" x2="620" y2="265" stroke="#ddd" stroke-width="1"/>
    
    <!-- Body text -->
    <text x="180" y="290" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a">Victoria,</text>
    
    <text x="180" y="313" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">Per our discussion, Yamamoto Industries has agreed to</text>
    <text x="180" y="330" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">the following terms for strategic partnership:</text>
    
    <!-- Key terms (highlighted) -->
    <rect x="190" y="345" width="410" height="95" fill="#fff9e6" stroke="#d4af37" stroke-width="1"/>
    <text x="205" y="365" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a" font-weight="bold">• Initial investment: $50M USD</text>
    <text x="205" y="383" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a" font-weight="bold">• Equity stake: 35% of Velocitas Aviation</text>
    <text x="205" y="401" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a" font-weight="bold">• Board seats: 2 (Yamamoto nominees)</text>
    <text x="205" y="419" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a" font-weight="bold">• Technology transfer: Prototype specs + IP</text>
    
    <!-- Critical paragraph -->
    <text x="180" y="460" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">The deal closes Monday, March 17th. Yamamoto requires</text>
    <text x="180" y="477" font-family="Arial, sans-serif" font-size="10" fill="#cc0000" font-weight="bold">your signature by end of business Friday (March 14th)</text>
    <text x="180" y="494" font-family="Arial, sans-serif" font-size="10" fill="#2a2a2a">or the offer expires. They have a backup option in Seoul.</text>
    
    <!-- Signature area -->
    <text x="180" y="520" font-family="Arial, sans-serif" font-size="9" fill="#555">— Dr. Elias Chen</text>
    
    <!-- Handwritten note (red pen) -->
    <g>
      <path d="M 420 345 Q 430 340 445 345 Q 460 350 470 355 Q 475 360 472 368" 
            fill="none" stroke="#cc0000" stroke-width="2.5" opacity="0.8"/>
      <text x="485" y="365" font-family="Brush Script MT, cursive" font-size="18" fill="#cc0000" font-weight="bold">NO!</text>
      
      <path d="M 200 419 L 590 419" stroke="#cc0000" stroke-width="2" opacity="0.7"/>
      <path d="M 200 419 L 590 401" stroke="#cc0000" stroke-width="2" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Evidence markers -->
  <g>
    <!-- Deadline marker -->
    <rect x="175" y="470" width="430" height="30" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="680" y1="485" x2="720" y2="485" stroke="#ffcc00" stroke-width="1.5"/>
    <text x="725" y="491" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffcc00">A</text>
    
    <!-- Handwritten rejection marker -->
    <circle cx="505" cy="360" r="30" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="525" y1="345" x2="560" y2="320" stroke="#ffcc00" stroke-width="1.5"/>
    <text x="565" y="325" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffcc00">B</text>
  </g>
  
  <!-- Evidence tag -->
  <g>
    <rect x="50" y="150" width="280" height="210" fill="#1a1a1a" stroke="#ffcc00" stroke-width="2" opacity="0.95"/>
    <text x="65" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#ffcc00">EVIDENCE #091</text>
    <line x1="65" y1="180" x2="315" y2="180" stroke="#333" stroke-width="1"/>
    
    <text x="65" y="200" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Item: Business Memo</text>
    <text x="65" y="218" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Source: V. Blake's briefcase</text>
    <text x="65" y="236" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Date: March 12, 2026</text>
    
    <line x1="65" y1="245" x2="315" y2="245" stroke="#444" stroke-width="1"/>
    
    <text x="65" y="265" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker A:</text>
    <text x="65" y="280" font-family="Arial, sans-serif" font-size="10" fill="#ff9999">URGENT DEADLINE</text>
    <text x="65" y="295" font-family="Arial, sans-serif" font-size="9" fill="#999">Signature required by</text>
    <text x="65" y="308" font-family="Arial, sans-serif" font-size="9" fill="#999">March 14 (day of death)</text>
    
    <text x="65" y="328" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Marker B:</text>
    <text x="65" y="343" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Handwritten "NO!"</text>
    <text x="65" y="356" font-family="Arial, sans-serif" font-size="9" fill="#999">Victoria rejected deal</text>
  </g>
  
  <!-- Motive note -->
  <g>
    <rect x="50" y="380" width="280" height="80" fill="#1a1a1a" stroke="#ff6666" stroke-width="2" opacity="0.9"/>
    <text x="65" y="403" font-family="Arial, sans-serif" font-size="10" fill="#ff9999" font-weight="bold">⚠ MOTIVE:</text>
    <text x="65" y="420" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Dr. Chen stood to gain</text>
    <text x="65" y="435" font-family="Arial, sans-serif" font-size="9" fill="#ccc">significant bonus if deal closed</text>
    <text x="65" y="450" font-family="Arial, sans-serif" font-size="9" fill="#ccc">Victoria's death = board chaos</text>
  </g>
  
  <!-- Scale reference -->
  <g>
    <rect x="650" y="540" width="100" height="15" fill="#333"/>
    <rect x="650" y="540" width="50" height="15" fill="#ffcc00"/>
    <text x="655" y="552" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold">0</text>
    <text x="695" y="552" font-family="Arial, sans-serif" font-size="10" fill="#ccc">5 cm</text>
  </g>
  
  <!-- Photo metadata -->
  <text x="350" y="580" font-family="Courier New, monospace" font-size="10" fill="#666">CSI-TV-2026-03-14_091_TOKYO_MEMO.JPG</text>
</svg>