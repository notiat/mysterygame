<svg width="1024" height="768" viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for realistic lighting -->
    <linearGradient id="tableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="epipenBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f4f4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4d4d4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="epipenOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8c42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="spotlight" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="tamperMark">
      <feTurbulence baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
  </defs>
  
  <!-- Dark forensic table background -->
  <rect width="1024" height="768" fill="url(#tableGrad)"/>
  
  <!-- Spotlight effect -->
  <ellipse cx="512" cy="250" rx="450" ry="350" fill="url(#spotlight)"/>
  
  <!-- Evidence tag background -->
  <rect x="50" y="50" width="200" height="80" rx="4" fill="#1a1f2e" stroke="#ffd700" stroke-width="2" opacity="0.9"/>
  <text x="150" y="85" fill="#ffd700" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">EVIDENCE</text>
  <text x="150" y="110" fill="#ffd700" font-family="'Courier New', monospace" font-size="24" font-weight="bold" text-anchor="middle">A-07</text>
  
  <!-- Main EpiPen body with shadow -->
  <g filter="url(#shadow)">
    <!-- EpiPen cap (orange safety cap) -->
    <rect x="200" y="300" width="80" height="180" rx="40" fill="url(#epipenOrange)"/>
    <rect x="220" y="320" width="40" height="4" rx="2" fill="#ff4444" opacity="0.6"/>
    <rect x="220" y="340" width="40" height="4" rx="2" fill="#ff4444" opacity="0.6"/>
    
    <!-- Main body (white/gray cylinder) -->
    <rect x="260" y="250" width="500" height="280" rx="20" fill="url(#epipenBody)"/>
    
    <!-- Label area -->
    <rect x="290" y="300" width="200" height="180" rx="8" fill="#ffffff" stroke="#c0c0c0" stroke-width="2"/>
    <text x="390" y="340" fill="#333" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">EpiPen</text>
    <text x="390" y="370" fill="#666" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Epinephrine Injection</text>
    <text x="390" y="395" fill="#888" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">0.3mg Auto-Injector</text>
    
    <!-- Tamper marks (scratches around seal) -->
    <line x1="500" y1="360" x2="520" y2="365" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>
    <line x1="505" y1="380" x2="525" y2="378" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>
    <line x1="498" y1="400" x2="515" y2="405" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Warning symbol -->
    <circle cx="390" cy="440" r="25" fill="#ff0000" opacity="0.9"/>
    <text x="390" y="453" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">!</text>
    
    <!-- Injection end (dark tip) -->
    <rect x="740" y="310" width="60" height="160" rx="10" fill="#2c2c2c"/>
    <circle cx="800" cy="390" r="30" fill="#1a1a1a"/>
    
    <!-- Needle indicator (red dot - misaligned/tampered) -->
    <circle cx="795" cy="385" r="4" fill="#ff0000" opacity="0.8"/>
  </g>
  
  <!-- Measurement ruler at bottom -->
  <rect x="150" y="640" width="700" height="50" fill="#2a2a2a" stroke="#666" stroke-width="2"/>
  <text x="160" y="670" fill="#00ff00" font-family="'Courier New', monospace" font-size="16">0</text>
  <line x1="200" y1="650" x2="200" y2="680" stroke="#00ff00" stroke-width="1"/>
  <text x="290" y="670" fill="#00ff00" font-family="'Courier New', monospace" font-size="16">5cm</text>
  <line x1="350" y1="650" x2="350" y2="680" stroke="#00ff00" stroke-width="1"/>
  <text x="440" y="670" fill="#00ff00" font-family="'Courier New', monospace" font-size="16">10cm</text>
  <line x1="500" y1="650" x2="500" y2="680" stroke="#00ff00" stroke-width="1"/>
  <text x="590" y="670" fill="#00ff00" font-family="'Courier New', monospace" font-size="16">15cm</text>
  <line x1="650" y1="650" x2="650" y2="680" stroke="#00ff00" stroke-width="1"/>
  <text x="740" y="670" fill="#00ff00" font-family="'Courier New', monospace" font-size="16">20cm</text>
  <line x1="800" y1="650" x2="800" y2="680" stroke="#00ff00" stroke-width="1"/>
  
  <!-- Crime scene tape effect (top) -->
  <rect x="0" y="0" width="1024" height="30" fill="#ffd700" opacity="0.3"/>
  <text x="20" y="20" fill="#000" font-family="Arial, sans-serif" font-size="14" font-weight="bold">⚠ FORENSIC EVIDENCE - DO NOT TAMPER ⚠</text>
  
  <!-- Additional evidence markers -->
  <circle cx="780" cy="120" r="30" fill="none" stroke="#ff0000" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="780" y="130" fill="#ff0000" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">1</text>
  
</svg>
