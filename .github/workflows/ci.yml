name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate assets
        run: npm run assets:validate

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          npm run start -- -p 3000 &
          echo $! > .next-server.pid
          sleep 4

      - name: Smoke tests
        env:
          SMOKE_BASE_URL: http://localhost:3000
        run: npm run smoke

      - name: Stop server
        if: always()
        run: |
          if [ -f .next-server.pid ]; then
            kill $(cat .next-server.pid) || true
          fi
